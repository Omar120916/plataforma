<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
}

/* SIDEBAR */
/* SIDEBAR NORMAL */
.sidebar {
    width: 220px;
    height: 100vh;
    position: fixed;
    padding: 20px;
    transition: 0.3s;
}

/* MAIN */
.main {
    margin-left: 220px;
    padding: 20px;
    transition: 0.3s;
}

/* BOTÓN ☰ */
.menu-toggle {
    position: fixed;
    top: 10px;
    left: 10px;
    z-index: 1001;
    display: none;
}

/* 📱 MODO CELULAR */
@media (max-width: 768px) {

    .menu-toggle {
        display: block;
    }

    .sidebar {
        transform: translateX(-100%);
        z-index: 1000;
    }

    .sidebar.active {
        transform: translateX(0);
    }

    .main {
        margin-left: 0;
        padding-top: 60px;
    }
}

/* CARD */
.card-form {
    background: rgba(255,255,255,0.95);
    padding: 30px;
    border-radius: 15px;
    width: 100%;
    max-width: 420px;
}
</style>
</head>

<body>

<button onclick="logout()" class="btn btn-danger btn-sm" style="position:fixed; top:10px; right:10px;">
Cerrar Sesión
</button>
<button class="menu-toggle btn btn-primary" onclick="toggleMenu()">☰</button>

<div class="sidebar">
    <h4>🎓 Admin</h4>

    <button onclick="mostrar('carrera')">🎓 Carreras</button>
    <button onclick="mostrar('materia')">📚 Materias</button>
    <button onclick="mostrar('maestro')">👨‍🏫 Maestros</button>
    <button onclick="mostrar('alumno')">👨‍🎓 Alumnos</button>
    <button onclick="mostrar('asignar')">🧩 Asignar materias</button>
    <button onclick="mostrar('padre')">👨‍👩‍👧 Padres</button>
</div>

<div class="main" id="main">
    <div id="contenido" class="card-form shadow"></div>
</div>

<script>
const token = localStorage.getItem('token')

if (!token) {
    window.location.href = '/index.html'
}

history.pushState(null, null, location.href)
window.onpopstate = function () {
    history.go(1)
}

// =======================
// FORMULARIOS
// =======================

function formCarrera() {
    return `
        <h4 class="text-center mb-3">Crear Carrera</h4>
        <input id="nombre" class="form-control mb-3" placeholder="Nombre carrera">
        <button class="btn btn-primary w-100" onclick="crearCarrera()">Guardar</button>
    `
}

function formMaestro() {
    return `
        <h4 class="text-center mb-3">Registrar Maestro</h4>
        <input id="nombre" class="form-control mb-2" placeholder="Nombre">
        <input id="usuario" class="form-control mb-2" placeholder="Usuario">
        <input id="password" type="password" class="form-control mb-3" placeholder="Contraseña">
        <button class="btn btn-primary w-100" onclick="crearUsuario('maestro')">Registrar</button>
    `
}

function formAlumno() {
    return `
        <h4 class="text-center mb-3">Registrar Alumno</h4>

        <input id="nombre" class="form-control mb-2" placeholder="Nombre">

        <select id="carrera" class="form-select mb-2"></select>

        <select id="materias" class="form-select mb-2" multiple></select>

        <input id="usuario" class="form-control mb-2" placeholder="Usuario">
        <input id="password" type="password" class="form-control mb-3" placeholder="Contraseña">

        <input id="grupo" class="form-control mb-2" placeholder="Grupo (Ej: A, B, 11-1)">
        
        <button class="btn btn-success w-100" onclick="crearAlumno()">Registrar</button>
    `
}

function formMateria() {
    return `
        <h4 class="text-center mb-3">Crear Materia</h4>

        <input id="nombre" class="form-control mb-2" placeholder="Nombre materia">

        <select id="carrera" class="form-select mb-2"></select>

        <select id="maestro" class="form-select mb-3"></select>

        <button class="btn btn-info w-100" onclick="crearMateria()">Crear</button>
    `
}

function formAsignar() {
    return `
        <h4 class="text-center mb-3">Asignar Materias</h4>

        <select id="alumno" class="form-select mb-2"></select>

        <select id="materias" class="form-select mb-3" multiple></select>

        <button class="btn btn-warning w-100" onclick="asignarMaterias()">
            Asignar
        </button>
    `
}

function formPadre() {
    return `
        <h4 class="text-center mb-3">Registrar Padre</h4>

        <input id="nombre" class="form-control mb-2" placeholder="Nombre">

        <select id="alumno" class="form-select mb-2" multiple></select>

        <input id="usuario" class="form-control mb-2" placeholder="Usuario">
        <input id="password" type="password" class="form-control mb-3" placeholder="Contraseña">

        <button class="btn btn-warning w-100" onclick="crearPadre()">Registrar</button>
    `
}

// =======================
// VISTAS
// =======================

function mostrar(tipo) {
    const cont = document.getElementById('contenido')

    if (tipo === 'carrera') cont.innerHTML = formCarrera()

    if (tipo === 'maestro') cont.innerHTML = formMaestro()

    if (tipo === 'alumno') {
        cont.innerHTML = formAlumno()
        setTimeout(() => cargarCarrerasAlumno(), 100)
    }

    if (tipo === 'materia') {
        cont.innerHTML = formMateria()
        setTimeout(() => {
            cargarCarrerasMateria()
            cargarMaestros()
        }, 100)
    }

    if (tipo === 'asignar') {
        cont.innerHTML = formAsignar()
        setTimeout(() => {
            cargarAlumnos()
            cargarMaterias()
        }, 100)
    }

    if (tipo === 'padre') {
        cont.innerHTML = formPadre()
        setTimeout(() => cargarAlumnosSelect(), 100)
    }
}

// =======================
// FUNCIONES
// =======================

async function crearCarrera() {
    const nombre = document.getElementById('nombre').value
    await fetch('/carreras', {
        method: 'POST',
        headers: {'Content-Type': 'application/json', Authorization: token},
        body: JSON.stringify({ nombre })
    })
    alert('Carrera creada 🔥')
}

async function crearUsuario(rol) {
    const nombre = document.getElementById('nombre').value
    const usuario = document.getElementById('usuario').value
    const password = document.getElementById('password').value

    await fetch('/registro', {
        method: 'POST',
        headers: {'Content-Type': 'application/json', Authorization: token},
        body: JSON.stringify({ nombre, usuario, password, rol })
    })

    alert('Usuario creado 🔥')
}

async function crearMateria() {
    const nombre = document.getElementById('nombre').value
    const carreraId = document.getElementById('carrera').value
    const maestroId = document.getElementById('maestro').value

    await fetch('/materias', {
        method: 'POST',
        headers: {'Content-Type': 'application/json', Authorization: token},
        body: JSON.stringify({ nombre, carreraId, maestroId })
    })

    alert('Materia creada 🔥')
}

async function crearAlumno() {
    const nombre = document.getElementById('nombre').value
    const carreraId = document.getElementById('carrera').value
    const grupo = document.getElementById('grupo').value

    const materias = Array.from(document.getElementById('materias').selectedOptions).map(o => o.value)

    const usuario = document.getElementById('usuario').value
    const password = document.getElementById('password').value

    const res = await fetch('/alumnos', {
        method: 'POST',
        headers: {'Content-Type': 'application/json', Authorization: token},
        body: JSON.stringify({ nombre, carreraId, grupo, materias })
    })

    const alumno = await res.json()

    await fetch('/registro', {
        method: 'POST',
        headers: {'Content-Type': 'application/json', Authorization: token},
        body: JSON.stringify({ nombre, usuario, password, rol: 'alumno', alumnoId: alumno._id })
    })

    alert('Alumno creado 🔥')
}

async function crearPadre() {
    const nombre = document.getElementById('nombre').value

    const alumnos = Array.from(
        document.getElementById('alumno').selectedOptions
    ).map(o => o.value) // 🔥 AQUÍ VA

    const usuario = document.getElementById('usuario').value
    const password = document.getElementById('password').value

    await fetch('/registro', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            Authorization: token
        },
        body: JSON.stringify({
            nombre,
            usuario,
            password,
            rol: 'padre',
            alumnos // 🔥 ARRAY DE HIJOS
        })
    })

    alert('Padre registrado')
}

// =======================
// CARGAS
// =======================

async function cargarCarrerasAlumno() {
    const res = await fetch('/carreras', { headers: { Authorization: token } })
    const data = await res.json()
    const select = document.getElementById('carrera')
    select.innerHTML = ''
    data.forEach(c => select.innerHTML += `<option value="${c._id}">${c.nombre}</option>`)
    select.addEventListener('change', cargarMateriasPorCarrera)
    cargarMateriasPorCarrera()
}

async function cargarCarrerasMateria() {
    const res = await fetch('/carreras', { headers: { Authorization: token } })
    const data = await res.json()
    const select = document.getElementById('carrera')
    select.innerHTML = ''
    data.forEach(c => select.innerHTML += `<option value="${c._id}">${c.nombre}</option>`)
}

async function cargarMateriasPorCarrera() {
    const carreraId = document.getElementById('carrera').value
    const res = await fetch(`/materias-por-carrera/${carreraId}`, { headers: { Authorization: token } })
    const data = await res.json()
    const select = document.getElementById('materias')
    if (!select) return
    select.innerHTML = ''
    data.forEach(m => select.innerHTML += `<option value="${m._id}">${m.nombre}</option>`)
}

async function cargarMaestros() {
    const res = await fetch('/usuarios', { headers: { Authorization: token } })
    const data = await res.json()
    const select = document.getElementById('maestro')
    select.innerHTML = ''
    data.filter(u => u.rol === 'maestro').forEach(m => {
        select.innerHTML += `<option value="${m._id}">${m.nombre}</option>`
    })
}

async function cargarAlumnos() {
    const res = await fetch('/alumnos', { headers: { Authorization: token } })
    const data = await res.json()
    const select = document.getElementById('alumno')
    if (!select) return
    select.innerHTML = ''
    data.forEach(a => select.innerHTML += `<option value="${a._id}">${a.nombre}</option>`)
}

async function cargarAlumnosSelect() {
    const res = await fetch('/alumnos', { headers: { Authorization: token } })
    const data = await res.json()
    const select = document.getElementById('alumno')
    select.innerHTML = ''
    data.forEach(a => select.innerHTML += `<option value="${a._id}">${a.nombre}</option>`)
}

async function cargarMaterias() {
    const res = await fetch('/materias', { headers: { Authorization: token } })
    const data = await res.json()
    const select = document.getElementById('materias')
    select.innerHTML = ''
    data.forEach(m => select.innerHTML += `<option value="${m._id}">${m.nombre}</option>`)
}

async function asignarMaterias() {
    const alumnoId = document.getElementById('alumno').value
    const materias = Array.from(document.getElementById('materias').selectedOptions).map(o => o.value)

    await fetch(`/alumnos/${alumnoId}/materias`, {
        method: 'PUT',
        headers: {'Content-Type': 'application/json', Authorization: token},
        body: JSON.stringify({ materias })
    })

    alert('Materias asignadas 🔥')
}

// =======================
// LOGOUT
// =======================

function logout() {
    localStorage.removeItem('token')
    window.location.href = '/index.html'
}

// =======================
mostrar('carrera')
</script>

</body>
</html>
