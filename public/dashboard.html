<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard Admin</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    margin: 0;
}

/* SIDEBAR */
.sidebar {
    height: 100vh;
    width: 220px;
    position: fixed;
    background: #0d6efd;
    color: white;
    padding-top: 20px;
}

.sidebar h4 {
    text-align: center;
    margin-bottom: 20px;
}

.sidebar button {
    width: 100%;
    border: none;
    background: none;
    color: white;
    padding: 10px;
    text-align: left;
}

.sidebar button:hover {
    background: rgba(255,255,255,0.2);
}

/* CONTENIDO */
.main {
    margin-left: 220px;
    padding: 20px;
}

/* CARD */
.card-form {
    max-width: 500px;
    margin: auto;
}

/* RESPONSIVE */
@media (max-width: 768px) {
    .sidebar {
        width: 100%;
        height: auto;
        position: relative;
    }

    .main {
        margin-left: 0;
    }
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h4>Admin</h4>

    <button onclick="mostrar('maestro')">👨‍🏫 Maestros</button>
    <button onclick="mostrar('alumno')">👨‍🎓 Alumnos</button>
    <button onclick="mostrar('padre')">👨‍👦 Papás</button>
</div>

<!-- CONTENIDO -->
<div class="main">

    <h3 id="titulo">Bienvenido Admin</h3>

    <div id="contenido"></div>

</div>

<script>
const token = localStorage.getItem('token')

// 🔥 CAMBIAR VISTA
function mostrar(tipo) {

    const cont = document.getElementById('contenido')

    if (tipo === 'maestro') {
        document.getElementById('titulo').innerText = 'Registrar Maestro'

        cont.innerHTML = `
            <div class="card card-form p-4 shadow">
                <input id="nombre" class="form-control mb-2" placeholder="Nombre">
                <input id="usuario" class="form-control mb-2" placeholder="Usuario">
                <input id="password" type="password" class="form-control mb-3" placeholder="Contraseña">

                <button class="btn btn-primary w-100" onclick="crearUsuario('maestro')">Registrar</button>
            </div>
        `
    }

    if (tipo === 'alumno') {
        document.getElementById('titulo').innerText = 'Registrar Alumno'

        cont.innerHTML = `
            <div class="card card-form p-4 shadow">
                <input id="nombre" class="form-control mb-2" placeholder="Nombre">
                <input id="grado" class="form-control mb-2" placeholder="Grado">

                <select id="maestro" class="form-select mb-3">
                    <option>Seleccionar maestro</option>
                </select>

                <button class="btn btn-success w-100" onclick="crearAlumno()">Registrar</button>
            </div>
        `

        cargarMaestros()
    }

    if (tipo === 'padre') {
        document.getElementById('titulo').innerText = 'Registrar Papá'

        cont.innerHTML = `
            <div class="card card-form p-4 shadow">
                <input id="usuario" class="form-control mb-2" placeholder="Usuario">
                <input id="password" type="password" class="form-control mb-2" placeholder="Contraseña">

                <select id="alumnoId" class="form-select mb-3"></select>

                <button class="btn btn-warning w-100" onclick="crearUsuario('padre')">Registrar</button>
            </div>
        `

        cargarAlumnos()
    }
}

// 🔐 CREAR USUARIO
async function crearUsuario(rol) {
    const nombre = document.getElementById('nombre')?.value
    const usuario = document.getElementById('usuario').value
    const password = document.getElementById('password').value
    const alumnoId = document.getElementById('alumnoId')?.value

    const res = await fetch('/registro', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'Authorization': token
        },
        body: JSON.stringify({ nombre, usuario, password, rol, alumnoId })
    })

    const data = await res.json()
    alert(data.mensaje)
}

// 👨‍🎓 CREAR ALUMNO
async function crearAlumno() {
    const nombre = document.getElementById('nombre').value
    const edad = document.getElementById('grado').value
    const maestro = document.getElementById('maestro').value

    await fetch('/alumnos', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'Authorization': token
        },
        body: JSON.stringify({ nombre, edad, maestro })
    })

    alert('Alumno registrado')
}

// 👨‍🏫 CARGAR MAESTROS
async function cargarMaestros() {
    const res = await fetch('/usuarios', {
        headers: { Authorization: token }
    })

    const data = await res.json()

    const select = document.getElementById('maestro')
    select.innerHTML = '<option>Seleccionar maestro</option>'

    data
        .filter(u => u.rol === 'maestro')
        .forEach(m => {
            select.innerHTML += `<option value="${m._id}">${m.nombre || m.usuario}</option>`
        })
}

// 👨‍🎓 CARGAR ALUMNOS
async function cargarAlumnos() {
    const res = await fetch('/alumnos', {
        headers: { Authorization: token }
    })

    const data = await res.json()

    const select = document.getElementById('alumnoId')
    select.innerHTML = ''

    data.forEach(a => {
        select.innerHTML += `<option value="${a._id}">${a.nombre}</option>`
    })
}

// INICIO
mostrar('maestro')
</script>

</body>
</html>
