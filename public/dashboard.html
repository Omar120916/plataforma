<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dashboard Admin</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: #f5f6fa;
}

/* SIDEBAR */
.sidebar {
    min-height: 100vh;
    background: linear-gradient(180deg, #2b6cb0, #1e40af);
    color: white;
}

.sidebar button {
    width: 100%;
    margin-bottom: 10px;
    border: none;
    background: transparent;
    color: white;
    text-align: left;
    padding: 10px;
}

.sidebar button:hover {
    background: rgba(255,255,255,0.2);
    border-radius: 8px;
}

/* RESPONSIVE */
@media (max-width: 768px) {
    .sidebar {
        position: fixed;
        width: 250px;
        left: -250px;
        top: 0;
        height: 100%;
        z-index: 1000;
        transition: 0.3s;
    }

    .sidebar.active {
        left: 0;
    }

    .overlay {
        display: none;
        position: fixed;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.5);
        top: 0;
        left: 0;
        z-index: 999;
    }

    .overlay.active {
        display: block;
    }
}
</style>
</head>

<body>

<!-- BOTÓN MOBILE -->
<nav class="navbar bg-primary text-white d-md-none">
    <button class="btn btn-light" onclick="toggleSidebar()">☰</button>
    <span>Admin</span>
</nav>

<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<div class="container-fluid">
<div class="row">

<!-- SIDEBAR -->
<div class="col-md-3 col-lg-2 sidebar p-3" id="sidebar">
    <h4>📚 Admin</h4>
    <hr>

    <button onclick="mostrar('maestros')">👨‍🏫 Maestros</button>
    <button onclick="mostrar('alumnos')">👨‍🎓 Alumnos</button>
    <button onclick="mostrar('padres')">👨‍👩‍👧 Papás</button>
</div>

<!-- CONTENIDO -->
<div class="col-md-9 col-lg-10 p-4">

    <div id="contenido"></div>

</div>

</div>
</div>

<script>
const token = localStorage.getItem('token')

// MENU MOBILE
function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('active')
    document.getElementById('overlay').classList.toggle('active')
}

// SECCIONES
function mostrar(seccion) {

    if (seccion === 'maestros') {
        document.getElementById('contenido').innerHTML = `
            <div class="card p-4 shadow">
                <h5>Agregar Maestro</h5>
                <input id="usuario" class="form-control mb-2" placeholder="Usuario">
                <input id="password" class="form-control mb-2" type="password" placeholder="Contraseña">
                <button class="btn btn-primary w-100" onclick="crear('maestro')">Guardar</button>
            </div>
        `
    }

    if (seccion === 'alumnos') {
        document.getElementById('contenido').innerHTML = `
            <div class="card p-4 shadow">
                <h5>Agregar Alumno</h5>
                <input id="nombre" class="form-control mb-2" placeholder="Nombre">
                <input id="edad" class="form-control mb-2" placeholder="Edad">
                <button class="btn btn-success w-100" onclick="crearAlumno()">Guardar</button>
            </div>
        `
    }

    if (seccion === 'padres') {
        document.getElementById('contenido').innerHTML = `
            <div class="card p-4 shadow">
                <h5>Agregar Papá</h5>
                <input id="usuario" class="form-control mb-2" placeholder="Usuario">
                <input id="password" class="form-control mb-2" type="password" placeholder="Contraseña">
                <input id="alumnoId" class="form-control mb-2" placeholder="ID alumno">
                <button class="btn btn-warning w-100" onclick="crear('padre')">Guardar</button>
            </div>
        `
    }
}

// CREAR USUARIO
async function crear(rol) {
    const usuario = document.getElementById('usuario').value
    const password = document.getElementById('password').value
    const alumnoId = document.getElementById('alumnoId')?.value

    await fetch('/registro', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'Authorization': token
        },
        body: JSON.stringify({ usuario, password, rol, alumnoId })
    })

    alert('Usuario creado')
}

// CREAR ALUMNO
async function crearAlumno() {
    const nombre = document.getElementById('nombre').value
    const edad = document.getElementById('edad').value

    await fetch('/alumnos', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'Authorization': token
        },
        body: JSON.stringify({ nombre, edad })
    })

    alert('Alumno creado')
}
</script>

</body>
</html>
