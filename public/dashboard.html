<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dashboard Admin</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: #f5f6fa;
}

.sidebar {
    height: 100vh;
    background: linear-gradient(180deg, #2b6cb0, #1e40af);
    color: white;
    padding: 20px;
}

.sidebar button {
    width: 100%;
    margin-bottom: 10px;
    border: none;
    background: transparent;
    color: white;
    text-align: left;
    padding: 10px;
}

.sidebar button:hover {
    background: rgba(255,255,255,0.2);
    border-radius: 8px;
}

.card {
    border-radius: 12px;
}
</style>
</head>

<body>

<div class="container-fluid">
<div class="row">

<!-- SIDEBAR -->
<div class="col-md-3 col-lg-2 sidebar">
    <h4>📚 Admin</h4>
    <hr>

    <button onclick="mostrar('maestros')">👨‍🏫 Agregar maestros</button>
    <button onclick="mostrar('alumnos')">👨‍🎓 Agregar alumnos</button>
    <button onclick="mostrar('padres')">👨‍👩‍👧 Agregar papás</button>
</div>

<!-- CONTENIDO -->
<div class="col-md-9 col-lg-10 p-4">

    <div id="contenido"></div>

</div>

</div>
</div>

<script>
const token = localStorage.getItem('token')

function mostrar(seccion) {

    if (seccion === 'maestros') {
        document.getElementById('contenido').innerHTML = `
            <div class="card p-4 shadow">
                <h5>Agregar Maestro</h5>
                <input id="usuario" class="form-control mb-2" placeholder="Usuario">
                <input id="password" class="form-control mb-2" type="password" placeholder="Contraseña">
                <button class="btn btn-primary" onclick="crear('maestro')">Guardar</button>
            </div>
        `
    }

    if (seccion === 'alumnos') {
        document.getElementById('contenido').innerHTML = `
            <div class="card p-4 shadow">
                <h5>Agregar Alumno</h5>
                <input id="nombre" class="form-control mb-2" placeholder="Nombre">
                <input id="edad" class="form-control mb-2" placeholder="Edad">
                <button class="btn btn-success" onclick="crearAlumno()">Guardar</button>
            </div>
        `
    }

    if (seccion === 'padres') {
        document.getElementById('contenido').innerHTML = `
            <div class="card p-4 shadow">
                <h5>Agregar Papá</h5>
                <input id="usuario" class="form-control mb-2" placeholder="Usuario">
                <input id="password" class="form-control mb-2" type="password" placeholder="Contraseña">
                <input id="alumnoId" class="form-control mb-2" placeholder="ID del alumno">
                <button class="btn btn-warning" onclick="crear('padre')">Guardar</button>
            </div>
        `
    }
}

// CREAR USUARIO
async function crear(rol) {
    const usuario = document.getElementById('usuario').value
    const password = document.getElementById('password').value
    const alumnoId = document.getElementById('alumnoId')?.value

    await fetch('/registro', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'Authorization': token
        },
        body: JSON.stringify({ usuario, password, rol, alumnoId })
    })

    alert('Usuario creado')
}

// CREAR ALUMNO
async function crearAlumno() {
    const nombre = document.getElementById('nombre').value
    const edad = document.getElementById('edad').value

    await fetch('/alumnos', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'Authorization': token
        },
        body: JSON.stringify({ nombre, edad })
    })

    alert('Alumno creado')
}
</script>

</body>
</html>
