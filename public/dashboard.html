<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
}

/* 🔥 SIDEBAR */
.sidebar {
    width: 240px;
    height: 100vh;
    position: fixed;
    padding: 20px;
    background: linear-gradient(180deg, #2563eb, #1e40af);
    color: white;
    box-shadow: 4px 0 10px rgba(0,0,0,0.2);
    transition: 0.3s;
}

.sidebar h4 {
    margin-bottom: 20px;
    font-weight: bold;
}

.sidebar button {
    width: 100%;
    border: none;
    background: rgba(255,255,255,0.1);
    color: white;
    padding: 12px 15px;
    text-align: left;
    border-radius: 10px;
    margin-bottom: 10px;
    transition: 0.3s;
}

.sidebar button:hover {
    background: rgba(255,255,255,0.25);
    transform: translateX(5px);
}

/* 🔥 MAIN (CORREGIDO) */
.main {
    position: relative;
    margin-left: 240px;
    padding: 30px;
    min-height: 100vh;

    display: flex;
    justify-content: center;
    align-items: flex-start;

    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;

    transition: background-image 0.5s ease;
}

/* 🔥 OVERLAY */
.main::before {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 0;
    pointer-events: none;
}

/* 📦 FORM */
.card-form {
    position: relative;
    z-index: 1;
    backdrop-filter: blur(10px);

    background: rgba(255,255,255,0.95);
    padding: 30px;
    border-radius: 15px;
    width: 100%;
    max-width: 420px;

    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

/* ☰ */
.menu-toggle {
    position: fixed;
    top: 10px;
    left: 10px;
    z-index: 1001;
    display: none;
}

/* 📱 RESPONSIVE */
@media (max-width: 768px) {

    .menu-toggle {
        display: block;
    }

    .sidebar {
        transform: translateX(-100%);
        z-index: 1000;
    }

    .sidebar.active {
        transform: translateX(0);
    }

    .main {
        margin-left: 0;
        padding-top: 60px;
        justify-content: center;
    }

    .card-form {
        max-width: 100%;
    }
}
</style>
</head>

<body>

<button onclick="logout()" class="btn btn-danger btn-sm" style="position:fixed; top:10px; right:10px;">
Cerrar Sesión
</button>

<button class="menu-toggle btn btn-primary" onclick="toggleMenu()">☰</button>

<div class="sidebar">
    <h4>🎓 Admin</h4>

    <button onclick="mostrar('carrera')">🎓 Carreras</button>
    <button onclick="mostrar('materia')">📚 Materias</button>
    <button onclick="mostrar('maestro')">👨‍🏫 Maestros</button>
    <button onclick="mostrar('alumno')">👨‍🎓 Alumnos</button>
    <button onclick="mostrar('asignar')">🧩 Asignar materias</button>
    <button onclick="mostrar('padre')">👨‍👩‍👧 Padres</button>
</div>

<div class="main" id="main">
    <div id="contenido" class="card-form"></div>
</div>

<script>
const token = localStorage.getItem('token')

if (!token) window.location.href = '/index.html'

history.pushState(null, null, location.href)
window.onpopstate = () => history.go(1)

/* 🔥 FONDO */
function cambiarFondo(img) {
    document.querySelector('.main').style.backgroundImage = `url('/img/${img}')`
}

/* ================= FORMULARIOS ================= */

function formCarrera() {
    return `
        <h4 class="text-center mb-3">Crear Carrera</h4>
        <input id="nombre" class="form-control mb-3" placeholder="Nombre carrera">
        <button class="btn btn-primary w-100" onclick="crearCarrera()">Guardar</button>
    `
}

function formMaestro() {
    return `
        <h4 class="text-center mb-3">Registrar Maestro</h4>
        <input id="nombre" class="form-control mb-2" placeholder="Nombre">
        <input id="usuario" class="form-control mb-2" placeholder="Usuario">
        <input id="password" type="password" class="form-control mb-3" placeholder="Contraseña">
        <button class="btn btn-primary w-100" onclick="crearUsuario('maestro')">Registrar</button>
    `
}

function formAlumno() {
    return `
        <h4 class="text-center mb-3">Registrar Alumno</h4>
        <input id="nombre" class="form-control mb-2" placeholder="Nombre">
        <select id="carrera" class="form-select mb-2"></select>
        <select id="materias" class="form-select mb-2" multiple></select>
        <input id="usuario" class="form-control mb-2" placeholder="Usuario">
        <input id="password" type="password" class="form-control mb-3" placeholder="Contraseña">
        <input id="grupo" class="form-control mb-2" placeholder="Grupo">
        <button class="btn btn-success w-100" onclick="crearAlumno()">Registrar</button>
    `
}

function formMateria() {
    return `
        <h4 class="text-center mb-3">Crear Materia</h4>
        <input id="nombre" class="form-control mb-2">
        <select id="carrera" class="form-select mb-2"></select>
        <select id="maestro" class="form-select mb-3"></select>
        <button class="btn btn-info w-100" onclick="crearMateria()">Crear</button>
    `
}

function formAsignar() {
    return `
        <h4 class="text-center mb-3">Asignar Materias</h4>
        <select id="alumno" class="form-select mb-2"></select>
        <select id="materias" class="form-select mb-3" multiple></select>
        <button class="btn btn-warning w-100" onclick="asignarMaterias()">Asignar</button>
    `
}

function formPadre() {
    return `
        <h4 class="text-center mb-3">Registrar Padre</h4>
        <input id="nombre" class="form-control mb-2">
        <select id="alumno" class="form-select mb-2" multiple></select>
        <input id="usuario" class="form-control mb-2">
        <input id="password" type="password" class="form-control mb-3">
        <button class="btn btn-warning w-100" onclick="crearPadre()">Registrar</button>
    `
}

/* ================= VISTAS ================= */

function mostrar(tipo) {
    const cont = document.getElementById('contenido')

    if (tipo === 'carrera') {
        cambiarFondo('fondo1.jpeg')
        cont.innerHTML = formCarrera()
    }

    if (tipo === 'maestro') {
        cambiarFondo('fondo2.jpeg')
        cont.innerHTML = formMaestro()
    }

    if (tipo === 'alumno') {
        cambiarFondo('fondo3.jpeg')
        cont.innerHTML = formAlumno()
        setTimeout(cargarCarrerasAlumno, 100)
    }

    if (tipo === 'materia') {
        cambiarFondo('fondo4.jpeg')
        cont.innerHTML = formMateria()
        setTimeout(() => {
            cargarCarrerasMateria()
            cargarMaestros()
        }, 100)
    }

    if (tipo === 'asignar') {
        cambiarFondo('fondo2.jpeg')
        cont.innerHTML = formAsignar()
        setTimeout(() => {
            cargarAlumnos()
            cargarMaterias()
        }, 100)
    }

    if (tipo === 'padre') {
        cambiarFondo('fondo3.jpeg')
        cont.innerHTML = formPadre()
        setTimeout(cargarAlumnosSelect, 100)
    }

    document.querySelector('.sidebar')?.classList.remove('active')
}

/* ================= FUNCIONES ================= */

async function crearCarrera() {
    const nombre = document.getElementById('nombre').value
    await fetch('/carreras', {
        method: 'POST',
        headers: {'Content-Type': 'application/json', Authorization: token},
        body: JSON.stringify({ nombre })
    })
    alert('Carrera creada 🔥')
}

async function cargarCarrerasAlumno() {

    const res = await fetch('/carreras', {
        headers: { Authorization: token }
    })

    const carreras = await res.json()

    const select = document.getElementById('carrera')

    select.innerHTML = carreras.map(c =>
        `<option value="${c._id}">${c.nombre}</option>`
    ).join('')

    cargarMateriasAlumno()
}

async function cargarMateriasAlumno() {

    const carreraId = document.getElementById('carrera').value

    const res = await fetch(`/materias-por-carrera/${carreraId}`, {
        headers: { Authorization: token }
    })

    const materias = await res.json()

    const select = document.getElementById('materias')

    select.innerHTML = materias.map(m =>
        `<option value="${m._id}">${m.nombre}</option>`
    ).join('')
}

async function cargarCarrerasMateria() {

    const res = await fetch('/carreras', {
        headers: { Authorization: token }
    })

    const carreras = await res.json()

    document.getElementById('carrera').innerHTML =
        carreras.map(c =>
            `<option value="${c._id}">${c.nombre}</option>`
        ).join('')
}

async function cargarMaestros() {

    const res = await fetch('/usuarios', {
        headers: { Authorization: token }
    })

    const usuarios = await res.json()

    const maestros = usuarios.filter(u => u.rol === 'maestro')

    document.getElementById('maestro').innerHTML =
        maestros.map(m =>
            `<option value="${m._id}">${m.nombre}</option>`
        ).join('')
}

async function crearMateria() {

    const nombre = document.getElementById('nombre').value
    const carreraId = document.getElementById('carrera').value
    const maestroId = document.getElementById('maestro').value

    await fetch('/materias', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            Authorization: token
        },
        body: JSON.stringify({
            nombre,
            carreraId,
            maestroId
        })
    })

    alert('Materia creada 🔥')
}

async function crearAlumno() {

    const nombre = document.getElementById('nombre').value
    const carreraId = document.getElementById('carrera').value
    const usuario = document.getElementById('usuario').value
    const password = document.getElementById('password').value
    const grupo = document.getElementById('grupo').value

    const materias = [...document.getElementById('materias').selectedOptions]
        .map(o => o.value)

    const alumno = await fetch('/alumnos', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            Authorization: token
        },
        body: JSON.stringify({
            nombre,
            carreraId,
            grupo,
            materias
        })
    })

    const alumnoData = await alumno.json()

    await fetch('/registro', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            Authorization: token
        },
        body: JSON.stringify({
            nombre,
            usuario,
            password,
            rol: 'alumno',
            alumnoId: alumnoData._id
        })
    })

    alert('Alumno registrado 🔥')
}

async function cargarAlumnos() {

    const res = await fetch('/alumnos', {
        headers: { Authorization: token }
    })

    const alumnos = await res.json()

    document.getElementById('alumno').innerHTML =
        alumnos.map(a =>
            `<option value="${a._id}">${a.nombre}</option>`
        ).join('')
}

async function cargarMaterias() {

    const res = await fetch('/materias', {
        headers: { Authorization: token }
    })

    const materias = await res.json()

    document.getElementById('materias').innerHTML =
        materias.map(m =>
            `<option value="${m._id}">${m.nombre}</option>`
        ).join('')
}

async function asignarMaterias() {

    const alumnoId = document.getElementById('alumno').value

    const materias = [...document.getElementById('materias').selectedOptions]
        .map(o => o.value)

    await fetch(`/alumnos/${alumnoId}/materias`, {
        method: 'PUT',
        headers: {
            'Content-Type': 'application/json',
            Authorization: token
        },
        body: JSON.stringify({ materias })
    })

    alert('Materias asignadas 🔥')
}

async function cargarAlumnosSelect() {

    const res = await fetch('/alumnos', {
        headers: { Authorization: token }
    })

    const alumnos = await res.json()

    document.getElementById('alumno').innerHTML =
        alumnos.map(a =>
            `<option value="${a._id}">${a.nombre}</option>`
        ).join('')
}

async function crearPadre() {

    const nombre = document.getElementById('nombre').value
    const usuario = document.getElementById('usuario').value
    const password = document.getElementById('password').value

    const alumnos = [...document.getElementById('alumno').selectedOptions]
        .map(o => o.value)

    await fetch('/registro', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            Authorization: token
        },
        body: JSON.stringify({
            nombre,
            usuario,
            password,
            rol: 'padre',
            alumnos
        })
    })

    alert('Padre registrado 🔥')
}


/* 🔽 EL RESTO DE TUS FUNCIONES QUEDAN IGUAL 🔽 */

function logout() {
    localStorage.removeItem('token')
    window.location.href = '/index.html'
}

function toggleMenu() {
    document.querySelector('.sidebar').classList.toggle('active')
}

/* INIT */
mostrar('carrera')
</script>

</body>
</html>
