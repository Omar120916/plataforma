<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Admin</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { margin: 0; }

/* SIDEBAR */
.sidebar {
    height: 100vh;
    width: 220px;
    position: fixed;
    background: #0d6efd;
    color: white;
    padding-top: 20px;
}

.sidebar h4 {
    text-align: center;
}

.sidebar button {
    width: 100%;
    border: none;
    background: none;
    color: white;
    padding: 12px;
    text-align: left;
}

.sidebar button:hover {
    background: rgba(255,255,255,0.2);
}

/* MAIN */
.main {
    margin-left: 220px;
    min-height: 100vh;
    background-size: cover;
    background-position: center;

    display: flex;
    justify-content: center;
    align-items: center;
}

/* CARD */
.card-form {
    background: rgba(255,255,255,0.95);
    padding: 30px;
    border-radius: 15px;
    width: 100%;
    max-width: 420px;
}

/* RESPONSIVE */
@media (max-width: 768px) {
    .sidebar {
        width: 100%;
        height: auto;
        position: relative;
    }

    .main {
        margin-left: 0;
        padding: 20px;
    }
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h4>🎓 Admin</h4>
    <button onclick="mostrar('maestro')">👨‍🏫 Maestros</button>
    <button onclick="mostrar('alumno')">👨‍🎓 Alumnos</button>
    <button onclick="mostrar('padre')">👨‍👦 Papás</button>
    <button onclick="mostrar('materia')">📚Materias</button>
    <button onclick="logout()" class="btn btn-sm btn-danger" style="position:fixed; top: 50px; right: 10px;">
        Cerrar Sesion
    </button>
</div>


<!-- MAIN -->
<div class="main">
    <div id="contenido" class="card-form shadow"></div>
</div>

<script>
const token = localStorage.getItem('token')

// 🧩 FORMULARIOS
function formMaestro() {
    return `
        <h4 class="text-center mb-3">Registrar Maestro</h4>
        <input id="nombre" class="form-control mb-2" placeholder="Nombre completo">
        <input id="usuario" class="form-control mb-2" placeholder="Usuario">
        <input id="password" type="password" class="form-control mb-3" placeholder="Contraseña">
        <button class="btn btn-primary w-100" onclick="crearUsuario('maestro')">Registrar</button>
    `
}

function formAlumno() {
    return `
        <h4 class="text-center mb-3">Registrar Alumno</h4>

        <input id="nombre" class="form-control mb-2" placeholder="Nombre">
        <input id="grado" class="form-control mb-2" placeholder="Grado">

        <input id="usuario" class="form-control mb-2" placeholder="Usuario">
        <input id="password" type="password" class="form-control mb-3" placeholder="Contraseña">

        <select id="materias" class="form-select mb-3" multiple> </select>

        <button class="btn btn-success w-100" onclick="crearAlumno()">Registrar</button>
    `
}

function formPadre() {
    return `
        <h4 class="text-center mb-3">Registrar Papá</h4>

        <input id="nombre" class="form-control mb-2" placeholder="Nombre completo">
        <input id="usuario" class="form-control mb-2" placeholder="Usuario">
        <input id="password" type="password" class="form-control mb-2" placeholder="Contraseña">

        <select id="alumnoId" class="form-select mb-3"></select>

        <button class="btn btn-warning w-100" onclick="crearUsuario('padre')">Registrar</button>
    `
}

function formMateria() {
    return `
        <h4 class="text-center mb-3">Crear Materia</h4>

        <input id="nombre" class="form-control mb-2" placeholder="Nombre (Ej: Inglés)">

        <select id="maestro" class="form-select mb-3">
            <option value="">Seleccionar maestro</option>
        </select>

        <button class="btn btn-info w-100" onclick="crearMateria()">Crear</button>
    `
}
// 🔄 CAMBIAR SECCIÓN
function mostrar(tipo) {
    const cont = document.getElementById('contenido')
    const main = document.querySelector('.main')

    if (tipo === 'maestro') {
        main.style.backgroundImage = "url('/img/fondo1.jpeg')"
        cont.innerHTML = formMaestro()
    }

    if (tipo === 'alumno') {
        main.style.backgroundImage = "url('/img/fondo3.jpeg')"
        cont.innerHTML = formAlumno()
        cargarMaterias()
    }

    if (tipo === 'padre') {
        main.style.backgroundImage = "url('/img/fondo2.jpeg')"
        cont.innerHTML = formPadre()
        cargarAlumnos()
    }

    if (tipo === 'materia') {
    main.style.backgroundImage = "url('/img/fondo4.jpeg')"
    cont.innerHTML = formMateria()
    cargarMaterias() // 👈 para llenar el select
}
}

// 🔐 CREAR USUARIO
async function crearUsuario(rol) {
    const nombre = document.getElementById('nombre')?.value
    const usuario = document.getElementById('usuario').value
    const password = document.getElementById('password').value
    const alumnoId = document.getElementById('alumnoId')?.value

    const res = await fetch('/registro', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'Authorization': token
        },
        body: JSON.stringify({ nombre, usuario, password, rol, alumnoId })
    })

    const data = await res.json()
    alert(data.mensaje)
}

// 👨‍🎓 CREAR ALUMNO
async function crearAlumno() {
    const nombre = document.getElementById('nombre').value
    const edad = document.getElementById('grado').value
    const materias = Array.from(
    document.getElementById('materias').selectedOptions
).map(opt => opt.value)

    const usuario = document.getElementById('usuario').value
    const password = document.getElementById('password').value

    // 🔥 1. Crear alumno
    const resAlumno = await fetch('/alumnos', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'Authorization': token
        },
        body: JSON.stringify({ nombre, edad, materias })
    })

    const alumno = await resAlumno.json()

    // 🔥 2. Crear usuario para ese alumno
    await fetch('/registro', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'Authorization': token
        },
        body: JSON.stringify({
            nombre,
            usuario,
            password,
            rol: 'alumno',
            alumnoId: alumno._id // 👈 vinculación
        })
    })

    alert('Alumno y usuario creados 🔥')
}

// 👨‍🏫 CARGAR MAESTROS
async function cargarMaestros() {
    try {
        const res = await fetch('/usuarios', {
            headers: {
                'Authorization': token
            }
        })

        const data = await res.json()

        const select = document.getElementById('maestro')

        if (!select) {
            console.error('No existe el select maestro')
            return
        }

        select.innerHTML = '<option value="">Seleccionar maestro</option>'

        data
            .filter(u => u.rol === 'maestro')
            .forEach(m => {
                const option = document.createElement('option')
                option.value = m._id
                option.textContent = m.nombre || m.usuario
                select.appendChild(option)
            })

    } catch (error) {
        console.error('Error cargando maestros:', error)
    }
}

// 👨‍🎓 CARGAR ALUMNOS
async function cargarAlumnos() {
    const res = await fetch('/alumnos', {
        headers: { Authorization: token }
    })

    const data = await res.json()

    const select = document.getElementById('alumnoId')
    select.innerHTML = ''

    data.forEach(a => {
        select.innerHTML += `<option value="${a._id}">${a.nombre}</option>`
    })
}

async function crearMateria() {
    const nombre = document.getElementById('nombre').value
    const maestroId = document.getElementById('maestro').value

    const res = await fetch('/materias', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'Authorization': token
        },
        body: JSON.stringify({ nombre, maestroId })
    })

    const data = await res.json()
    alert('Materia creada 🔥')
}

async function cargarMaterias() {
    const res = await fetch('/materias', {
        headers: { Authorization: token }
    })

    const data = await res.json()

    const select = document.getElementById('materias')
    select.innerHTML = ''

    data.forEach(m => {
        select.innerHTML += `<option value="${m._id}">${m.nombre}</option>`
    })
}

function logout() {
    if (confirm('¿Seguro que quieres cerrar sesión?')) {
        localStorage.removeItem('token')
        window.location.href = '/login.html'
    }
}

// 🚀 INICIO
mostrar('maestro')

</script>

</body>
</html>
