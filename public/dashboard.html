<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { margin: 0; font-family: 'Segoe UI'; }

/* SIDEBAR */
.sidebar {
    height: 100vh;
    width: 220px;
    position: fixed;
    background: #0d6efd;
    color: white;
    padding-top: 20px;
}

.sidebar button {
    width: 100%;
    border: none;
    background: none;
    color: white;
    padding: 12px;
    text-align: left;
}

.sidebar button:hover {
    background: rgba(255,255,255,0.2);
}

/* MAIN */
.main {
    margin-left: 220px;
    padding: 20px;
}

/* CARD */
.card-form {
    background: white;
    padding: 25px;
    border-radius: 15px;
    max-width: 450px;
    width: 100%;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h4 class="text-center">🎓 Admin</h4>
    <button onclick="mostrar('carrera')">🎓 Carreras</button>
    <button onclick="mostrar('materia')">📚 Materias</button>
    <button onclick="mostrar('alumno')">👨‍🎓 Alumnos</button>
</div>

<!-- MAIN -->
<div class="main">
    <div id="contenido" class="card-form shadow"></div>
</div>

<script>
const token = localStorage.getItem('token')

// =====================
// 🔄 CAMBIAR VISTA
// =====================

function mostrar(tipo) {
    const cont = document.getElementById('contenido')

    if (tipo === 'carrera') cont.innerHTML = formCarrera()
    if (tipo === 'materia') {
        cont.innerHTML = formMateria()
        setTimeout(() => {
            cargarCarreras()
            cargarMaestros()
        }, 100)
    }
    if (tipo === 'alumno') {
        cont.innerHTML = formAlumno()
        setTimeout(() => {
            cargarCarreras()
        }, 100)
    }
}

// =====================
// 🧩 FORMULARIOS
// =====================

function formCarrera() {
    return `
        <h4>Crear Carrera</h4>
        <input id="nombre" class="form-control mb-3" placeholder="Nombre carrera">
        <button class="btn btn-primary w-100" onclick="crearCarrera()">Guardar</button>
    `
}

function formMateria() {
    return `
        <h4>Crear Materia</h4>

        <input id="nombre" class="form-control mb-2" placeholder="Nombre materia">

        <select id="carrera" class="form-select mb-2"></select>

        <select id="maestro" class="form-select mb-3"></select>

        <button class="btn btn-success w-100" onclick="crearMateria()">Guardar</button>
    `
}

function formAlumno() {
    return `
        <h4>Crear Alumno</h4>

        <input id="nombre" class="form-control mb-2" placeholder="Nombre">
        <input id="edad" class="form-control mb-2" placeholder="Edad">

        <select id="carrera" class="form-select mb-2" onchange="cargarMaterias()"></select>

        <select id="materias" class="form-select mb-3" multiple></select>

        <button class="btn btn-warning w-100" onclick="crearAlumno()">Guardar</button>
    `
}

// =====================
// 🎓 CARRERAS
// =====================

async function crearCarrera() {
    const nombre = document.getElementById('nombre').value

    await fetch('/carreras', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: token },
        body: JSON.stringify({ nombre })
    })

    alert('Carrera creada 🔥')
}

async function cargarCarreras() {
    const res = await fetch('/carreras', {
        headers: { Authorization: token }
    })

    const data = await res.json()

    const select = document.getElementById('carrera')
    select.innerHTML = ''

    data.forEach(c => {
        select.innerHTML += `<option value="${c._id}">${c.nombre}</option>`
    })
}

// =====================
// 📚 MATERIAS
// =====================

async function crearMateria() {
    const nombre = document.getElementById('nombre').value
    const maestroId = document.getElementById('maestro').value
    const carreraId = document.getElementById('carrera').value

    await fetch('/materias', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: token },
        body: JSON.stringify({ nombre, maestroId, carreraId })
    })

    alert('Materia creada 🔥')
}

async function cargarMaterias() {
    const carreraId = document.getElementById('carrera').value
    const select = document.getElementById('materias')

    if (!carreraId) return

    const res = await fetch(`/materias?carreraId=${carreraId}`, {
        headers: { Authorization: token }
    })

    const data = await res.json()

    select.innerHTML = ''

    data.forEach(m => {
        select.innerHTML += `<option value="${m._id}">${m.nombre}</option>`
    })
}

// =====================
// 👨‍🏫 MAESTROS
// =====================

async function cargarMaestros() {
    const res = await fetch('/usuarios', {
        headers: { Authorization: token }
    })

    const data = await res.json()

    const select = document.getElementById('maestro')
    select.innerHTML = ''

    data
        .filter(u => u.rol === 'maestro')
        .forEach(m => {
            select.innerHTML += `<option value="${m._id}">${m.nombre}</option>`
        })
}

// =====================
// 👨‍🎓 ALUMNOS
// =====================

async function crearAlumno() {
    const nombre = document.getElementById('nombre').value
    const edad = document.getElementById('edad').value
    const carreraId = document.getElementById('carrera').value

    const materias = Array.from(
        document.getElementById('materias').selectedOptions
    ).map(opt => opt.value)

    await fetch('/alumnos', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: token },
        body: JSON.stringify({ nombre, edad, carreraId, materias })
    })

    alert('Alumno creado 🔥')
}

// =====================
// 🚀 INICIO
// =====================

mostrar('carrera')
</script>

</body>
</html>
