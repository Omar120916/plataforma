<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-light">

<div class="container py-3">

    <!-- HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3>Dashboard</h3>
        <button class="btn btn-danger" onclick="logout()">Cerrar sesión</button>
    </div>

    <!-- CARDS -->
    <div class="row g-3 mb-4">
        <div class="col-12 col-md-6">
            <div class="card p-3 shadow-sm text-center">
                <h5>Total de alumnos</h5>
                <h2 id="total">0</h2>
            </div>
        </div>

        <div class="col-12 col-md-6">
            <div class="card p-3 shadow-sm text-center">
                <h5>Acciones</h5>
                <a href="alumnos.html" class="btn btn-primary mt-2">Ir a alumnos</a>
            </div>
        </div>
    </div>

    <div class="card p-3 shadow-sm mb-4">
    <h5>Alumnos por edad</h5>
    <canvas id="grafica"></canvas>
</div>

    <!-- LISTA -->
    <div class="card p-3 shadow-sm">
        <h5>Últimos alumnos</h5>
        <ul class="list-group" id="lista"></ul>
    </div>

</div>

<script>
const token = localStorage.getItem('token')

if (!token) {
    alert('No autorizado')
    window.location.href = 'index.html'
}

function logout() {
    localStorage.removeItem('token')
    window.location.href = 'index.html'
}

async function cargar() {
    const res = await fetch('/alumnos', {
        headers: { 'Authorization': token }
    })

    const data = await res.json()

    // TOTAL
    document.getElementById('total').textContent = data.length

    // LISTA
    const lista = document.getElementById('lista')
    lista.innerHTML = ''

    data.slice(-5).reverse().forEach(alumno => {
        const li = document.createElement('li')
        li.className = 'list-group-item d-flex justify-content-between'
        li.innerHTML = `
            <span>${alumno.nombre}</span>
            <span class="text-muted">${alumno.edad}</span>
        `
        lista.appendChild(li)
    })

    // 🔥 AGRUPAR POR EDAD
    const edades = {}

    data.forEach(alumno => {
        const edad = alumno.edad
        edades[edad] = (edades[edad] || 0) + 1
    })

    // DATOS PARA GRÁFICA
    const labels = Object.keys(edades)
    const valores = Object.values(edades)

    // CREAR GRÁFICA
    new Chart(document.getElementById('grafica'), {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [{
                label: 'Cantidad de alumnos',
                data: valores
            }]
        }
    })
}

cargar()
</script>

</body>
</html>
