<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Panel Admin</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
}

/* FONDO */
.fondo {
    min-height: 100vh;
    background: url('https://images.unsplash.com/photo-1588072432836-e10032774350') no-repeat center;
    background-size: cover;

    display: flex;
    justify-content: center;
    align-items: center;
}

/* CARD */
.card-form {
    background: rgba(255, 255, 255, 0.95);
    padding: 30px;
    border-radius: 15px;
    width: 100%;
    max-width: 420px;
}

/* BOTONES ARRIBA */
.menu {
    position: fixed;
    top: 10px;
    left: 10px;
    z-index: 1000;
}

.menu button {
    margin-right: 5px;
}

/* RESPONSIVE */
@media (max-width: 768px) {
    .card-form {
        margin: 20px;
    }
}
</style>
</head>

<body>

<!-- MENÚ -->
<div class="menu">
    <button class="btn btn-primary btn-sm" onclick="mostrar('maestro')">Maestro</button>
    <button class="btn btn-success btn-sm" onclick="mostrar('alumno')">Alumno</button>
    <button class="btn btn-warning btn-sm" onclick="mostrar('padre')">Papá</button>
</div>

<div class="fondo">

    <div id="formulario" class="card-form shadow"></div>

</div>

<script>
const token = localStorage.getItem('token')

function mostrar(tipo) {

if (tipo === 'maestro') {
    document.getElementById('formulario').innerHTML = `
        <h4 class="text-center mb-3">Registrar Maestro</h4>

        <input id="nombre" class="form-control mb-2" placeholder="Nombre completo">
        <input id="usuario" class="form-control mb-2" placeholder="Usuario">
        <input id="password" type="password" class="form-control mb-3" placeholder="Contraseña">

        <button class="btn btn-primary w-100" onclick="crearUsuario('maestro')">Registrar</button>
    `
}

    if (tipo === 'alumno') {
        document.getElementById('formulario').innerHTML = `
            <h4 class="text-center mb-3">Registrar Alumno</h4>

            <input id="nombre" class="form-control mb-2" placeholder="Nombre">
            <input id="correo" class="form-control mb-2" placeholder="Correo">
            <input id="grado" class="form-control mb-2" placeholder="Grado">
            <input id="grupo" class="form-control mb-2" placeholder="Grupo">

            <select id="maestro" class="form-select mb-3">
                <option>Seleccionar maestro</option>
            </select>

            <button class="btn btn-success w-100" onclick="crearAlumno()">Registrar</button>
        `

        cargarMaestros()
    }

    if (tipo === 'padre') {
        document.getElementById('formulario').innerHTML = `
            <h4 class="text-center mb-3">Registrar Papá</h4>

            <input id="usuario" class="form-control mb-2" placeholder="Usuario">
            <input id="password" type="password" class="form-control mb-2" placeholder="Contraseña">

            <select id="alumnoId" class="form-select mb-3">
                <option>Seleccionar alumno</option>
            </select>

            <button class="btn btn-warning w-100" onclick="crearUsuario('padre')">Registrar</button>
        `

        cargarAlumnos()
    }
}

// 🔐 CREAR USUARIO
async function crearUsuario(rol) {
    const nombre = document.getElementById('nombre')?.value
    const usuario = document.getElementById('usuario').value
    const password = document.getElementById('password').value
    const alumnoId = document.getElementById('alumnoId')?.value

    const res = await fetch('/registro', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'Authorization': token
        },
        body: JSON.stringify({
            nombre,
            usuario,
            password,
            rol,
            alumnoId
        })
    })

    const data = await res.json()
    alert(data.mensaje)
}

// 👨‍🎓 CREAR ALUMNO
async function crearAlumno() {
    const nombre = document.getElementById('nombre').value
    const edad = document.getElementById('grado').value

    await fetch('/alumnos', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'Authorization': token
        },
        body: JSON.stringify({ nombre, edad })
    })

    alert('Alumno registrado')
}

// 👨‍🏫 CARGAR MAESTROS
async function cargarMaestros() {
    const res = await fetch('/usuarios', {
        headers: { 'Authorization': token }
    })

    const data = await res.json()

    const select = document.getElementById('maestro')

    data
        .filter(u => u.rol === 'maestro')
        .forEach(m => {
            select.innerHTML += `<option value="${m._id}">${m.nombre}</option>`
        })
}

// 👨‍🎓 CARGAR ALUMNOS
async function cargarAlumnos() {
    const res = await fetch('/alumnos', {
        headers: { 'Authorization': token }
    })

    const data = await res.json()

    const select = document.getElementById('alumnoId')

    data.forEach(a => {
        select.innerHTML += `<option value="${a._id}">${a.nombre}</option>`
    })
}

// CARGA INICIAL
mostrar('maestro')
</script>

</body>
</html>
