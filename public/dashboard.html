<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
}

/* SIDEBAR */
.sidebar {
    width: 220px;
    height: 100vh;
    position: fixed;
    background: linear-gradient(180deg, #0d6efd, #00c6ff);
    color: white;
    padding: 20px;
}

.sidebar h4 {
    text-align: center;
}

.sidebar button {
    width: 100%;
    border: none;
    background: none;
    color: white;
    padding: 12px;
    text-align: left;
    border-radius: 10px;
    transition: 0.3s;
}

.sidebar button:hover {
    background: rgba(255,255,255,0.2);
}

/* MAIN */
.main {
    margin-left: 220px;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* CARD */
.card-form {
    background: rgba(255,255,255,0.95);
    padding: 30px;
    border-radius: 15px;
    width: 100%;
    max-width: 420px;
}
</style>
</head>

<body>

<button onclick="logout()" class="btn btn-danger btn-sm" style="position:fixed; top:10px; right:10px;">
Cerrar Sesión
</button>

<div class="sidebar">
    <h4>🎓 Admin</h4>

    <button onclick="mostrar('carrera')">🎓 Carreras</button>
    <button onclick="mostrar('materia')">📚 Materias</button>
    <button onclick="mostrar('maestro')">👨‍🏫 Maestros</button>
    <button onclick="mostrar('alumno')">👨‍🎓 Alumnos</button>
</div>

<div class="main" id="main">
    <div id="contenido" class="card-form shadow"></div>
</div>

<script>
const token = localStorage.getItem('token')

// =======================
// 🧩 FORMULARIOS
// =======================

function formCarrera() {
    return `
        <h4 class="text-center mb-3">Crear Carrera</h4>
        <input id="nombre" class="form-control mb-3" placeholder="Nombre carrera">
        <button class="btn btn-primary w-100" onclick="crearCarrera()">Guardar</button>
    `
}

function formMaestro() {
    return `
        <h4 class="text-center mb-3">Registrar Maestro</h4>
        <input id="nombre" class="form-control mb-2" placeholder="Nombre">
        <input id="usuario" class="form-control mb-2" placeholder="Usuario">
        <input id="password" type="password" class="form-control mb-3" placeholder="Contraseña">
        <button class="btn btn-primary w-100" onclick="crearUsuario('maestro')">Registrar</button>
    `
}

function formAlumno() {
    return `
        <h4 class="text-center mb-3">Registrar Alumno</h4>

        <input id="nombre" class="form-control mb-2" placeholder="Nombre">

        <select id="carrera" class="form-select mb-2"></select>

        <select id="materias" class="form-select mb-2" multiple></select>

        <input id="usuario" class="form-control mb-2" placeholder="Usuario">
        <input id="password" type="password" class="form-control mb-3" placeholder="Contraseña">

        <button class="btn btn-success w-100" onclick="crearAlumno()">Registrar</button>
    `
}

function formMateria() {
    return `
        <h4 class="text-center mb-3">Crear Materia</h4>

        <input id="nombre" class="form-control mb-2" placeholder="Nombre materia">

        <select id="carrera" class="form-select mb-2"></select>

        <select id="maestro" class="form-select mb-3"></select>

        <button class="btn btn-info w-100" onclick="crearMateria()">Crear</button>
    `
}

// =======================
// 🔄 CAMBIAR VISTA
// =======================

function mostrar(tipo) {
    const cont = document.getElementById('contenido')
    const main = document.getElementById('main')

    if (tipo === 'carrera') {
        main.style.backgroundImage = "url('https://images.unsplash.com/photo-1522202176988-66273c2fd55f')"
        cont.innerHTML = formCarrera()
    }

    if (tipo === 'maestro') {
        main.style.backgroundImage = "url('https://images.unsplash.com/photo-1509062522246-3755977927d7')"
        cont.innerHTML = formMaestro()
    }

    if (tipo === 'alumno') {
        main.style.backgroundImage = "url('https://images.unsplash.com/photo-1513258496099-48168024aec0')"
        cont.innerHTML = formAlumno()

        setTimeout(() => {
            cargarCarreras()
        }, 100)
    }

    if (tipo === 'materia') {
        main.style.backgroundImage = "url('https://images.unsplash.com/photo-1497633762265-9d179a990aa6')"
        cont.innerHTML = formMateria()

        setTimeout(() => {
            cargarCarreras()
            cargarMaestros()
        }, 100)
    }
}

// =======================
// 🔥 FUNCIONES
// =======================

async function crearCarrera() {
    const nombre = document.getElementById('nombre').value

    await fetch('/carreras', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            Authorization: token
        },
        body: JSON.stringify({ nombre })
    })

    alert('Carrera creada 🔥')
}

async function crearUsuario(rol) {
    const nombre = document.getElementById('nombre').value
    const usuario = document.getElementById('usuario').value
    const password = document.getElementById('password').value

    await fetch('/registro', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            Authorization: token
        },
        body: JSON.stringify({ nombre, usuario, password, rol })
    })

    alert('Usuario creado 🔥')
}

async function crearAlumno() {
    const nombre = document.getElementById('nombre').value
    const carreraId = document.getElementById('carrera').value

    const materias = Array.from(
        document.getElementById('materias').selectedOptions
    ).map(o => o.value)

    const usuario = document.getElementById('usuario').value
    const password = document.getElementById('password').value

    const res = await fetch('/alumnos', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            Authorization: token
        },
        body: JSON.stringify({ nombre, carreraId, materias })
    })

    const alumno = await res.json()

    await fetch('/registro', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            Authorization: token
        },
        body: JSON.stringify({
            nombre,
            usuario,
            password,
            rol: 'alumno',
            alumnoId: alumno._id
        })
    })

    alert('Alumno creado 🔥')
}

async function crearMateria() {
    const nombre = document.getElementById('nombre').value
    const carreraId = document.getElementById('carrera').value
    const maestroId = document.getElementById('maestro').value

    await fetch('/materias', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            Authorization: token
        },
        body: JSON.stringify({ nombre, carreraId, maestroId })
    })

    alert('Materia creada 🔥')
}

// =======================
// 📦 CARGAR DATOS
// =======================

async function cargarCarreras() {
    const res = await fetch('/carreras', {
        headers: { Authorization: token }
    })

    const data = await res.json()

    const select = document.getElementById('carrera')
    select.innerHTML = '<option value="">Seleccionar</option>'

    data.forEach(c => {
        select.innerHTML += `<option value="${c._id}">${c.nombre}</option>`
    })

    select.addEventListener('change', cargarMateriasPorCarrera)
}

async function cargarMateriasPorCarrera() {
    const carreraId = document.getElementById('carrera').value

    const res = await fetch('/materias?carreraId=' + carreraId, {
        headers: { Authorization: token }
    })

    const data = await res.json()

    const select = document.getElementById('materias')
    if (!select) return

    select.innerHTML = ''

    data.forEach(m => {
        select.innerHTML += `<option value="${m._id}">${m.nombre}</option>`
    })
}

async function cargarMaestros() {
    const res = await fetch('/usuarios', {
        headers: { Authorization: token }
    })

    const data = await res.json()

    const select = document.getElementById('maestro')
    select.innerHTML = ''

    data.filter(u => u.rol === 'maestro').forEach(m => {
        select.innerHTML += `<option value="${m._id}">${m.nombre}</option>`
    })
}

// =======================
// 🔐 LOGOUT
// =======================

function logout() {
    localStorage.removeItem('token')
    window.location.href = '/index.html'
}

// 🚀 INICIO
mostrar('carrera')
</script>

</body>
</html>
