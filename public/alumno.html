<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alumno</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #1e3a8a, #0d6efd);
    color: white;
}

/* BOTÓN ☰ */
.menu-toggle {
    position: fixed;
    top: 10px;
    left: 10px;
    z-index: 1001;
    background: #0d6efd;
    border: none;
    color: white;
    padding: 10px;
    border-radius: 8px;
    display: none;
}

/* SIDEBAR */
.sidebar {
    width: 220px;
    height: 100vh;
    position: fixed;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    padding: 20px;
    transition: 0.3s;
}

.sidebar button {
    width: 100%;
    border: none;
    background: none;
    color: white;
    padding: 12px;
    text-align: left;
    border-radius: 10px;
    transition: 0.3s;
}

.sidebar button:hover {
    background: rgba(255,255,255,0.2);
    transform: translateX(5px);
}

/* MAIN */
.main {
    margin-left: 220px;
    padding: 20px;
    transition: 0.3s;
}

/* CARDS */
.card {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    border-radius: 15px;
    color: white;
}

/* 📱 RESPONSIVE */
@media (max-width: 768px) {

    .menu-toggle {
        display: block;
    }

    .sidebar {
        transform: translateX(-100%);
        position: fixed;
        z-index: 1000;
    }

    .sidebar.active {
        transform: translateX(0);
    }

    .main {
        margin-left: 0;
        padding-top: 60px;
    }
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar p-3">
    <h5>🎓 Alumno Dashboard</h5>
</nav>

<button class="menu-toggle" onclick="toggleMenu()">☰</button>
<!-- SIDEBAR -->
<div class="sidebar">
    <h5>Menú</h5>
    <button onclick="mostrar('inicio')">🏠 Inicio</button>
    <button onclick="mostrar('materias')">📚 Materias</button>
    <button onclick="mostrar('calificaciones')">📊 Calificaciones</button>
</div>

<!-- MAIN -->
<div class="main" id="contenido"></div>

<script>
const token = localStorage.getItem('token')

function toggleMenu() {
    document.querySelector('.sidebar').classList.toggle('active')
}

// 🔄 CAMBIAR VISTA
function mostrar(tipo) {
    const cont = document.getElementById('contenido')

    if (tipo === 'inicio') {
        cont.innerHTML = `
            <h3>Bienvenido 👋</h3>
            <p>Este es tu panel</p>
        `
    }

    if (tipo === 'materias') {
        cargarMateriasAlumno()
    }

    if (tipo === 'calificaciones') {
        cont.innerHTML = `
            <h3>Calificaciones</h3>
            <div class="card p-3">
                <p>Matemáticas: 9.0</p>
                <p>Inglés: 8.5</p>
            </div>
        `
    }

    document.querySelector('.sidebar').classList.remove('active')
}

// 📚 CARGAR MATERIAS DEL ALUMNO
async function cargarMateriasAlumno() {
    const res = await fetch('/mi-alumno', {
        headers: { Authorization: token }
    })

    const alumno = await res.json()

    let html = '<h3>Mis materias</h3><div class="row">'

    alumno.materias.forEach(m => {
        html += `
            <div class="col-md-4">
                <div class="card p-3 mb-3">
                    <h5>${m.nombre}</h5>
                </div>
            </div>
        `
    })

    html += '</div>'

    document.getElementById('contenido').innerHTML = html
}

// 🚀 INICIO
mostrar('inicio')
</script>

</body>
</html>
