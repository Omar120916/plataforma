<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alumno</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

/* BASE */
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    transition: 0.3s;
}

/* 🌙 DARK */
body.dark {
    background: #0f172a;
    color: #e2e8f0;
}

body.dark .sidebar {
    background: #1e293b;
}

body.dark .sidebar button {
    color: #e2e8f0;
}

body.dark .card {
    background: #1e293b;
    color: #e2e8f0;
}

/* 🌞 LIGHT */
body.light {
    background: #f1f5f9;
    color: #1e293b;
}

body.light .sidebar {
    background: white;
    border-right: 1px solid #e5e7eb;
}

body.light .sidebar button {
    color: #1e293b;
}

body.light .sidebar button:hover {
    background: #e2e8f0;
}

body.light .card {
    background: white;
    color: #1e293b;
}

/* BOTÓN ☰ */
.menu-toggle {
    position: fixed;
    top: 10px;
    left: 10px;
    z-index: 1001;
    background: #0d6efd;
    border: none;
    color: white;
    padding: 10px;
    border-radius: 8px;
    display: none;
}

/* SIDEBAR */
.sidebar {
    width: 220px;
    height: 100vh;
    position: fixed;
    backdrop-filter: blur(10px);
    padding: 20px;
    transition: 0.3s;
}

/* BOTONES */
.sidebar button {
    width: 100%;
    border: none;
    background: none;
    padding: 12px;
    text-align: left;
    border-radius: 10px;
    transition: 0.3s;
}

.sidebar button:hover {
    transform: translateX(5px);
}

/* MAIN */
.main {
    margin-left: 220px;
    padding: 20px;
    transition: 0.3s;
}

/* CARDS */
.card {
    border-radius: 15px;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.02);
}

/* 📱 RESPONSIVE */
@media (max-width: 768px) {

    .menu-toggle {
        display: block;
    }

    .sidebar {
        transform: translateX(-100%);
        z-index: 1000;
    }

    .sidebar.active {
        transform: translateX(0);
    }

    .main {
        margin-left: 0;
        padding-top: 60px;
    }
}

</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar p-3">
    <h5>🎓 Alumno Dashboard</h5>
</nav>

<!-- BOTONES -->
<button onclick="toggleTheme()" class="btn btn-sm btn-outline-light" style="position: fixed; top: 10px; right: 10px;">
    🌙 / ☀️
</button>
    <button onclick="logout()" class="btn btn-sm btn-danger" style="position:fixed; top: 50px; right: 10px;">
        Cerrar Sesion
    </button>
<button class="menu-toggle" onclick="toggleMenu()">☰</button>

<!-- SIDEBAR -->
<div class="sidebar">
    <h5>Menú</h5>
    <button onclick="mostrar('inicio')">🏠 Inicio</button>
    <button onclick="mostrar('materias')">📚 Materias</button>
    <button onclick="mostrar('calificaciones')">📊 Calificaciones</button>
    <button onclick="mostrar('tareas')">📝 Tareas</button>
    <button onclick="mostrar('misTareas')">⭐ Mis tareas calificadas</button>

</div>

<!-- MAIN -->
<div class="main" id="contenido"></div>

<script>
    
const token = localStorage.getItem('token')

if (!token) {
    alert('Sesión expirada, vuelve a iniciar sesión')
    window.location.href = '/index.html'
}

history.pushState(null, null, location.href)
window.onpopstate = function () {
    history.go(1)
}

// 🔥 CARGAR TEMA AL INICIO (CORREGIDO)
window.onload = () => {
    const theme = localStorage.getItem('theme') || 'dark'
    document.body.classList.add(theme)
}

// 🌗 CAMBIAR TEMA
function toggleTheme() {
    const body = document.body

    if (body.classList.contains('dark')) {
        body.classList.replace('dark', 'light')
        localStorage.setItem('theme', 'light')
    } else {
        body.classList.replace('light', 'dark')
        localStorage.setItem('theme', 'dark')
    }
}

// ☰ MENÚ RESPONSIVE
function toggleMenu() {
    document.querySelector('.sidebar').classList.toggle('active')
}

// 🔄 CAMBIAR VISTA
function mostrar(tipo) {
    const cont = document.getElementById('contenido')

    if (tipo === 'inicio') {
        cont.innerHTML = `
            <h3>Bienvenido 👋</h3>
            <p>Este es tu panel</p>
        `
    }

    if (tipo === 'materias') {
        cargarMateriasAlumno()
    }

    if (tipo === 'calificaciones') {
        cargarCalificaciones()
    }

    if (tipo === 'tareas') {
    cargarTareas()
    }

    if (tipo === 'misTareas') {
        cargarMisEntregas()
    }


    // 👇 CERRAR MENÚ EN MÓVIL
    const sidebar = document.querySelector('.sidebar')
    if (sidebar) sidebar.classList.remove('active')
}

// 📚 CARGAR MATERIAS
async function cargarMateriasAlumno() {

    const [resAlumno, resCalifs] = await Promise.all([
        fetch('/mi-alumno', {
            headers: { Authorization: token }
        }),
        fetch('/mis-calificaciones', {
            headers: { Authorization: token }
        })
    ])

    if (!resAlumno.ok || !resCalifs.ok) {
        document.getElementById('contenido').innerHTML = `
            <p class="text-danger">Error cargando datos 😥</p>
        `
        return
    }

    const alumno = await resAlumno.json()
    const calificaciones = await resCalifs.json()

    let html = '<h3 class="mb-4">📚 Mis materias</h3><div class="row">'

    let suma = 0
    let contador = 0

    if (!alumno.materias || alumno.materias.length === 0) {
        html += '<p>No tienes materias asignadas 😢</p>'
    } else {

        alumno.materias.forEach(m => {

            const calif = calificaciones.find(c => c.materia === m.nombre)

            let texto = 'Sin calificación'
            let color = 'text-muted'

            if (calif) {
                const c = calif.calificacion

                suma += c
                contador++

                if (c < 6) {
                    texto = `Reprobado: ${c} ❌`
                    color = 'text-danger'
                } else if (c < 8) {
                    texto = `Regular: ${c} ⚠️`
                    color = 'text-warning'
                } else {
                    texto = `Excelente: ${c} 🔥`
                    color = 'text-success'
                }
            }

            html += `
                <div class="col-md-4">
                    <div class="card p-3 mb-3 shadow">
                        <h5>${m.nombre}</h5>
                        <small class="${color}">${texto}</small>
                    </div>
                </div>
            `
        })
    }

    html += '</div>'

    // 🔥 PROMEDIO
    if (contador > 0) {
        const promedio = (suma / contador).toFixed(1)

        let mensaje = ''
        let color = ''

        if (promedio < 6) {
            mensaje = 'Vas mal 😬'
            color = 'text-danger'
        } else if (promedio < 8) {
            mensaje = 'Puedes mejorar 😐'
            color = 'text-warning'
        } else {
            mensaje = 'Excelente trabajo 🔥'
            color = 'text-success'
        }

        html = `
            <div class="card p-3 mb-4 shadow text-center">
                <h4>📊 Promedio: ${promedio}</h4>
                <p class="${color}">${mensaje}</p>
            </div>
        ` + html
    }

    document.getElementById('contenido').innerHTML = html
}

function logout() {
    if (confirm('¿Seguro que quieres cerrar sesión?')) {
        localStorage.removeItem('token')
        window.location.href = '/index.html'
    }
}

async function cargarCalificaciones() {
    const res = await fetch('/mis-calificaciones', {
        headers: { Authorization: token }
    })

    const data = await res.json()

    let html = '<h3>Calificaciones</h3>'

    if (data.length === 0) {
        html += '<p>No hay calificaciones aún</p>'
    } else {
        html += '<div class="card p-3">'

        data.forEach(c => {
            html += `<p>${c.materia}: ${c.calificacion}</p>`
        })

        html += '</div>'
    }

    document.getElementById('contenido').innerHTML = html
}

async function cargarTareas() {

    const res = await fetch('/mis-tareas', {
        headers: { Authorization: token }
    })

    const tareas = await res.json()

    let html = '<h3 class="mb-4">📝 Mis tareas</h3>'

    if (tareas.length === 0) {
        html += `
        <div class="card p-4 shadow text-center">
            <h5>🎉 No tienes tareas pendientes</h5>
        </div>
        `
    }

    tareas.forEach(t => {

        const limite = new Date(`${t.fechaLimite}T${t.horaLimite}`)
        const ahora = new Date()

        const vencida = ahora > limite

        html += `
        <div class="card p-3 mb-3 shadow">

            <div class="d-flex justify-content-between align-items-center">
                <h5>${t.titulo}</h5>

                ${
                    vencida
                    ? '<span class="badge bg-danger">Cerrada</span>'
                    : '<span class="badge bg-success">Activa</span>'
                }
            </div>

            <p>${t.descripcion}</p>

            <small class="text-muted">
                📅 ${t.fechaLimite} ⏰ ${t.horaLimite}
            </small>
        `

        if (!vencida) {

            html += `
            <input type="file"
                id="file-${t._id}"
                class="form-control my-3">

            <button class="btn btn-primary"
                onclick="subirTarea('${t._id}')">

                📤 Subir tarea
            </button>
            `
        } else {

            html += `
            <div class="alert alert-danger mt-3 mb-0">
                ⛔ Tiempo agotado
            </div>
            `
        }

        html += `</div>`
    })

    document.getElementById('contenido').innerHTML = html
}

async function subirTarea(tareaId) {

    const fileInput = document.getElementById(`file-${tareaId}`)
    const file = fileInput.files[0]

    if (!file) {
        alert('Selecciona archivo')
        return
    }

    const formData = new FormData()
    formData.append('archivo', file)
    formData.append('tareaId', tareaId)

    const res = await fetch('/entregar-tarea', {
        method: 'POST',
        headers: {
            Authorization: token
        },
        body: formData
    })

    const data = await res.json()

    alert(data.mensaje || 'Error')
}

async function cargarMisEntregas() {

    const res = await fetch('/mis-entregas', {
        headers: {
            Authorization: token
        }
    })

    const data = await res.json()

    let html = '<h3>⭐ Mis tareas</h3>'

    if (data.length === 0) {
        html += `
        <div class="card p-3">
            No tienes tareas calificadas
        </div>
        `
    }

    data.forEach(t => {

        html += `
        <div class="card p-3 mb-3">

            <h5>${t.tarea}</h5>

            <h4 class="text-success">
                ${t.calificacion ?? 'Sin calificar'}
            </h4>

            <p>
                ${t.comentario || 'Sin comentarios'}
            </p>

        </div>
        `
    })

    document.getElementById('contenido').innerHTML = html
}

// 🚀 INICIO
mostrar('inicio')
</script>

</body>
</html>
