<!DOCTYPE html>
<html>
<head>
    <title>Alumnos</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-3">

    <!-- HEADER -->
    <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-3">
        <h3 class="mb-2 mb-md-0">Panel de alumnos</h3>
        <button class="btn btn-danger" onclick="logout()">Cerrar sesión</button>
    </div>

    <!-- FORM -->
    <div class="card p-3 mb-3 shadow-sm">
        <h5>Registrar alumno</h5>

        <div class="row g-2">
            <div class="col-12 col-md-6">
                <input class="form-control" id="nombre" placeholder="Nombre">
            </div>
            <div class="col-12 col-md-6">
                <input class="form-control" id="edad" placeholder="Edad">
            </div>
        </div>

        <button class="btn btn-primary mt-3 w-100 w-md-auto" onclick="guardar()">Guardar</button>
    </div>

    <!-- LISTA -->
    <div class="card p-3 shadow-sm">
        <h5>Lista de alumnos</h5>
        <ul class="list-group" id="lista"></ul>
    </div>

</div>

<script>
const token = localStorage.getItem('token')

if (!token) {
    alert('No autorizado')
    window.location.href = 'index.html'
}

function logout() {
    localStorage.removeItem('token')
    window.location.href = 'index.html'
}

async function guardar() {
    const nombre = document.getElementById('nombre').value
    const edad = document.getElementById('edad').value

    if (!nombre || !edad) {
        alert('Completa todos los campos')
        return
    }

    await fetch('/alumnos', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'Authorization': token
        },
        body: JSON.stringify({ nombre, edad })
    })

    cargar()
}

async function cargar() {
    const res = await fetch('/alumnos', {
        headers: { 'Authorization': token }
    })

    const data = await res.json()

    const lista = document.getElementById('lista')
    lista.innerHTML = ''

    data.forEach(alumno => {
        const li = document.createElement('li')
        li.className = 'list-group-item d-flex justify-content-between'
        li.innerHTML = `
            <span>${alumno.nombre}</span>
            <span class="text-muted">${alumno.edad}</span>
        `
        lista.appendChild(li)
    })
}

cargar()
</script>

</body>
</html>
