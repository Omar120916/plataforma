<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Padre</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    transition: 0.3s;
}

/* 🌙 DARK */
body.dark {
    background: #0f172a;
    color: #e2e8f0;
}
body.dark .sidebar { background: #1e293b; }
body.dark .card { background: #1e293b; color: #e2e8f0; }

/* 🌞 LIGHT */
body.light {
    background: #f1f5f9;
    color: #1e293b;
}
body.light .sidebar {
    background: white;
    border-right: 1px solid #ddd;
}
body.light .card {
    background: white;
    color: #1e293b;
}

/* SIDEBAR */
.sidebar {
    width: 220px;
    height: 100vh;
    position: fixed;
    padding: 20px;
    backdrop-filter: blur(10px);
}

/* MAIN */
.main {
    margin-left: 220px;
    padding: 20px;
}

/* BOTONES */
.top-buttons {
    position: fixed;
    top: 10px;
    right: 10px;
    display: flex;
    gap: 10px;
    z-index: 1000;
}

/* ☰ */
.menu-toggle {
    position: fixed;
    top: 10px;
    left: 10px;
    z-index: 1001;
    display: none;
}

/* COLORES */
.alta { color: #22c55e; }
.media { color: #facc15; }
.baja { color: #ef4444; }

/* 📱 RESPONSIVE */
@media (max-width: 768px) {

    .menu-toggle { display: block; }

    .sidebar {
        transform: translateX(-100%);
        z-index: 1000;
    }

    .sidebar.active {
        transform: translateX(0);
    }

    .main {
        margin-left: 0;
        padding-top: 60px;
    }

    .top-buttons {
        top: 50px;
        right: 10px;
        flex-wrap: wrap;
    }

    .card {
        padding: 15px !important;
    }

    .nav-tabs {
        overflow-x: auto;
        flex-wrap: nowrap;
    }

    .nav-tabs .nav-link {
        white-space: nowrap;
        font-size: 0.85rem;
    }
}
</style>
</head>

<body>

<!-- ☰ -->
<button class="menu-toggle btn btn-primary" onclick="toggleMenu()">☰</button>

<!-- SIDEBAR -->
<div class="sidebar">
    <h5>👨‍👦 Menú</h5>
    <button onclick="cargar()">🏠 Inicio</button>
    <button onclick="verAlertas()">🚨 Alertas</button>
    <button onclick="generarBoleta()" class="btn btn-success mb-3">
        Descargar boleta
    </button>
</div>

<!-- BOTONES -->
<div class="top-buttons">
    <button onclick="toggleTheme()" class="btn btn-sm btn-outline-primary">🌙</button>

    <button onclick="verAlertas()" class="btn btn-sm btn-warning position-relative">
        🔔
        <span id="badge" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">
            0
        </span>
    </button>

    <button onclick="logout()" class="btn btn-sm btn-danger">Salir</button>
</div>

<!-- MAIN -->
<div class="main">
    <h3 class="mb-4">👨‍👦 Panel del Papá</h3>
    <ul class="nav nav-tabs mb-3" id="tabs"></ul>
    <div id="contenido"></div>

<!-- 💬 CHAT -->
    <div class="card p-3 mt-4">

        <h5>💬 Chat</h5>

        <select id="usuariosChat"
            class="form-select mb-2"
            onchange="seleccionarUsuario()">

        </select>

        <div id="chat" style="
            height:300px;
            overflow:auto;
            border:1px solid #ccc;
            border-radius:10px;
            padding:10px;
        "></div>

        <input id="mensaje"
            class="form-control mt-2"
            placeholder="Mensaje">

        <button class="btn btn-primary mt-2"
            onclick="enviarMensaje()">

            Enviar
        </button>

    </div>


</div>

<!-- 🔔 TOAST -->
<div id="toast" style="
position: fixed;
bottom: 20px;
right: 20px;
background: #0d6efd;
color: white;
padding: 15px;
border-radius: 10px;
display: none;
z-index: 9999;
">
🔔 Nueva alerta
</div>

<div id="boleta" style="
background: white;
color: black;
padding: 20px;
width: 800px;
margin: 20px auto;
display:none;
">
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="/socket.io/socket.io.js"></script>
<script>

const token = localStorage.getItem('token')

const socket = io()

const payload = JSON.parse(
    atob(token.split('.')[1])
)

socket.emit('entrar', payload.id)

if (!token) window.location.href = '/index.html'

let alertasGlobal = []

history.pushState(null, null, location.href)
window.onpopstate = () => history.go(1)

window.onload = () => {
    const theme = localStorage.getItem('theme') || 'dark'
    document.body.classList.add(theme)
}

// 🌗 TEMA
function toggleTheme() {
    const body = document.body
    if (body.classList.contains('dark')) {
        body.classList.replace('dark', 'light')
        localStorage.setItem('theme', 'light')
    } else {
        body.classList.replace('light', 'dark')
        localStorage.setItem('theme', 'dark')
    }
}

// ☰ MENU
function toggleMenu() {
    document.querySelector('.sidebar').classList.toggle('active')
}

// 🔐 LOGOUT
function logout() {
    localStorage.removeItem('token')
    window.location.href = '/index.html'
}

// 🔔 ALERTAS
async function actualizarAlertas() {
    const res = await fetch('/alertas', { headers: { Authorization: token } })
    const data = await res.json()

    alertasGlobal = data
    document.getElementById('badge').innerText = data.length

    if (data.length > 0) {
        mostrarToast(`Tienes ${data.length} alertas`)
    }
}

async function generarBoleta() {

    const alumnos = await (await fetch('/alumnos', {
        headers: { Authorization: token }
    })).json()

    const calificaciones = await (await fetch('/mis-calificaciones', {
        headers: { Authorization: token }
    })).json()

    const hijos = alumnos.filter(a =>
        payload.alumnos?.includes(a._id)
    )

    if (hijos.length === 0) {
        alert('No hay alumnos')
        return
    }

    const hijo = hijos[0]

    const califs = calificaciones.filter(c =>
        c.alumnoId === hijo._id
    )

    let promedio = 0

    if (califs.length > 0) {
        promedio = (
            califs.reduce((a,c)=>a+c.calificacion,0)
            / califs.length
        ).toFixed(1)
    }

    let html = `
    <div style="font-family:sans-serif;">

        <h1 style="
            text-align:center;
            color:#0d6efd;
            margin-bottom:20px;
        ">
            📄 BOLETA ESCOLAR
        </h1>

        <hr>

        <p><strong>Alumno:</strong> ${hijo.nombre}</p>
        <p><strong>Grupo:</strong> ${hijo.grupo || 'N/A'}</p>

        <table style="
            width:100%;
            border-collapse:collapse;
            margin-top:20px;
        ">

            <thead>
                <tr style="
                    background:#0d6efd;
                    color:white;
                ">
                    <th style="
                        padding:10px;
                        border:1px solid #ddd;
                    ">
                        Materia
                    </th>

                    <th style="
                        padding:10px;
                        border:1px solid #ddd;
                    ">
                        Calificación
                    </th>
                </tr>
            </thead>

            <tbody>
    `

    califs.forEach(c => {

        html += `
        <tr>

            <td style="
                padding:10px;
                border:1px solid #ddd;
            ">
                ${c.materia}
            </td>

            <td style="
                padding:10px;
                border:1px solid #ddd;
                text-align:center;
            ">
                ${c.calificacion}
            </td>

        </tr>
        `
    })

    html += `
            </tbody>
        </table>

        <h2 style="
            margin-top:20px;
            color:#16a34a;
        ">
            Promedio: ${promedio}
        </h2>

    </div>
    `

    const elemento = document.getElementById('boleta')

    elemento.innerHTML = html

    elemento.style.display = 'block'

await html2pdf()
.set({
    margin: 10,
    filename: `Boleta-${hijo.nombre}.pdf`,
    image: {
        type: 'jpeg',
        quality: 1
    },
    html2canvas: {
        scale: 2
    },
    jsPDF: {
        unit: 'mm',
        format: 'a4',
        orientation: 'portrait'
    }
})
.from(elemento)
.save()

elemento.style.display = 'none'
}

function mostrarToast(msg) {
    const toast = document.getElementById('toast')
    toast.innerText = msg
    toast.style.display = 'block'

    setTimeout(() => toast.style.display = 'none', 3000)
}

function verAlertas() {
    let html = '<h3>🚨 Alertas</h3>'

    if (alertasGlobal.length === 0) {
        html += '<p class="text-success">Todo bien 👍</p>'
    } else {
        alertasGlobal.forEach(a => {
            let color = a.tipo === 'baja' ? 'danger' : 'secondary'
            html += `<div class="alert alert-${color}">${a.mensaje}</div>`
        })
    }

    document.getElementById('contenido').innerHTML = html
    document.getElementById('badge').innerText = 0
}



// 👨‍👦 DASHBOARD
async function cargar() {

    const alumnos = await (await fetch('/alumnos', { headers: { Authorization: token } })).json()
    const calificaciones = await (await fetch('/mis-calificaciones', { headers: { Authorization: token } })).json()

    const hijos = alumnos.filter(a => payload.alumnos?.includes(a._id))

    const tabs = document.getElementById('tabs')
    const cont = document.getElementById('contenido')

    tabs.innerHTML = ''
    cont.innerHTML = ''

    hijos.forEach((hijo, i) => {

        tabs.innerHTML += `
        <li class="nav-item">
            <button class="nav-link ${i===0?'active':''}" onclick="mostrarHijo('${hijo._id}')">
                👦 ${hijo.nombre}
            </button>
        </li>`

        const califs = calificaciones.filter(c => c.alumnoId === hijo._id)

        let prom = califs.length ? (califs.reduce((a,c)=>a+c.calificacion,0)/califs.length).toFixed(1) : 0
        let clase = prom>=9?'alta':prom<6?'baja':'media'

        let html = `
        <div id="hijo-${hijo._id}" class="hijo-tab" style="display:${i===0?'block':'none'}">
            <div class="card p-3 mb-3 shadow">
                <h5>${hijo.nombre}</h5>
                <p>Grupo: ${hijo.grupo||'N/A'}</p>
                <h6 class="${clase}">Promedio: ${prom}</h6><hr>
        `

        if (!califs.length) {
            html += '<p>Sin calificaciones</p>'
        } else {
            califs.forEach(c=>{
                let col = c.calificacion>=9?'alta':c.calificacion<6?'baja':'media'
                html += `<div class="d-flex justify-content-between">
                <span>${c.materia}</span>
                <strong class="${col}">${c.calificacion}</strong>
                </div>`
            })
        }

        html += '</div></div>'
        cont.innerHTML += html
    })
}

// 🔄 CAMBIAR HIJO
function mostrarHijo(id) {
    document.querySelectorAll('.hijo-tab').forEach(d=>d.style.display='none')
    document.getElementById('hijo-'+id).style.display='block'

    document.querySelectorAll('.nav-link').forEach(b=>b.classList.remove('active'))
    event.target.classList.add('active')

    document.querySelector('.sidebar')?.classList.remove('active')
}

// =====================
// 💬 CHAT
// =====================

let receptorId = ''

// 🔥 CARGAR USUARIOS
async function cargarUsuariosChat() {

    const res = await fetch('/usuarios', {
        headers: {
            Authorization: token
        }
    })

    const usuarios = await res.json()

    let html = `
        <option value="">
            Selecciona usuario
        </option>
    `

    usuarios.forEach(u => {

        // 🚫 NO MOSTRARSE A SÍ MISMO
        if (u._id !== payload.id) {

            html += `
                <option value="${u._id}">
                    ${u.nombre} (${u.rol})
                </option>
            `
        }
    })

    document.getElementById('usuariosChat')
        .innerHTML = html
}

// 👤 SELECCIONAR USUARIO
function seleccionarUsuario() {

    receptorId =
        document.getElementById('usuariosChat').value
}

// 📤 ENVIAR MENSAJE
function enviarMensaje() {

    const mensaje =
        document.getElementById('mensaje').value

    if (!receptorId) {
        alert('Selecciona usuario')
        return
    }

    if (!mensaje) return

    socket.emit('mensaje', {

        de: payload.id,

        para: receptorId,

        mensaje
    })

    document.getElementById('mensaje').value = ''
}

// 📥 RECIBIR MENSAJES
socket.on('mensaje', (msg) => {

    document.getElementById('chat').innerHTML += `

        <div class="mb-2">

            <b>
                ${
                    msg.de === payload.id
                    ? 'Tú'
                    : msg.nombre ||'Usuario'
                }
                :
            </b>

            ${msg.mensaje}

        </div>
    `

    // 🔥 AUTO SCROLL
    const chat =
        document.getElementById('chat')

    chat.scrollTop =
        chat.scrollHeight
})

// 🚀 INICIO
cargar()

cargarUsuariosChat()

actualizarAlertas()

setInterval(actualizarAlertas, 5000)

</script>

<script>

if('serviceWorker' in navigator){

    navigator.serviceWorker.register('/sw.js')
}

</script>

<script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>

<script>

window.OneSignalDeferred =
window.OneSignalDeferred || [];

OneSignalDeferred.push(async function(OneSignal) {

    await OneSignal.init({

        appId:
        "afbe2ea5-d2f8-4c26-aa38-6a478b2d4205"

    });

    await OneSignal.Notifications.requestPermission()

    const id =
        OneSignal.User.PushSubscription.id

    console.log('ONESIGNAL ID:', id)

    if(id){

        fetch('/guardar-onesignal', {

            method:'POST',

            headers:{
                'Content-Type':
                    'application/json',

                Authorization:
                    localStorage.getItem('token')
            },

            body:JSON.stringify({

                onesignalId:id
            })
        })
    }

});

</script>
</body>
</html>
