<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Padre Premium</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    transition: 0.3s;
    font-family: 'Segoe UI', sans-serif;
}

/* 🌙 DARK */
body.dark {
    background: #0f172a;
    color: #e2e8f0;
}

body.dark .card {
    background: #1e293b;
    color: #e2e8f0;
}

/* 🌞 LIGHT */
body.light {
    background: #f1f5f9;
    color: #1e293b;
}

body.light .card {
    background: white;
    color: #1e293b;
}

/* TABS */
.nav-tabs .nav-link {
    color: inherit;
}

.nav-tabs .nav-link.active {
    background: #0d6efd;
    color: white;
    border: none;
}

/* CARD */
.card {
    border-radius: 15px;
}

/* COLORES */
.alta { color: #22c55e; }
.media { color: #facc15; }
.baja { color: #ef4444; }
</style>
</head>

<body>

<!-- BOTONES -->
<button onclick="toggleTheme()" class="btn btn-sm btn-outline-primary"
style="position:fixed; top:10px; right:100px;">
🌙 / ☀️
</button>

<button onclick="logout()" class="btn btn-sm btn-danger"
style="position:fixed; top:10px; right:10px;">
Cerrar Sesión
</button>

<div class="container mt-5">

<h3 class="mb-4">👨‍👦 Panel del Papá</h3>

<ul class="nav nav-tabs mb-3" id="tabs"></ul>

<div id="contenido"></div>

</div>

<script>
const token = localStorage.getItem('token')

// 🔐 PROTECCIÓN
if (!token) {
    window.location.href = '/index.html'
}

// 🚫 BLOQUEAR ATRÁS
history.pushState(null, null, location.href)
window.onpopstate = () => history.go(1)

// 🌗 TEMA
window.onload = () => {
    const theme = localStorage.getItem('theme') || 'dark'
    document.body.classList.add(theme)
}

function toggleTheme() {
    const body = document.body

    if (body.classList.contains('dark')) {
        body.classList.replace('dark', 'light')
        localStorage.setItem('theme', 'light')
    } else {
        body.classList.replace('light', 'dark')
        localStorage.setItem('theme', 'dark')
    }
}

// 🔐 LOGOUT
function logout() {
    localStorage.removeItem('token')
    window.location.href = '/index.html'
}

// 🔍 TOKEN
const payload = JSON.parse(atob(token.split('.')[1]))

async function cargar() {

    const resAlumnos = await fetch('/alumnos', {
        headers: { Authorization: token }
    })
    const alumnos = await resAlumnos.json()

    const resCalif = await fetch('/mis-calificaciones', {
        headers: { Authorization: token }
    })
    const calificaciones = await resCalif.json()

    const hijos = alumnos.filter(a => payload.alumnos?.includes(a._id))

    const tabs = document.getElementById('tabs')
    const cont = document.getElementById('contenido')

    tabs.innerHTML = ''
    cont.innerHTML = ''

    if (hijos.length === 0) {
        cont.innerHTML = '<p>No hay hijos asignados 😢</p>'
        return
    }

    hijos.forEach((hijo, index) => {

        tabs.innerHTML += `
            <li class="nav-item">
                <button class="nav-link ${index === 0 ? 'active' : ''}"
                    onclick="mostrarHijo('${hijo._id}')">
                    👦 ${hijo.nombre}
                </button>
            </li>
        `

        const califsHijo = calificaciones.filter(c => c.alumnoId === hijo._id)

        let promedio = 0
        if (califsHijo.length > 0) {
            promedio = califsHijo.reduce((acc, c) => acc + c.calificacion, 0) / califsHijo.length
        }

        let clase = 'media'
        if (promedio >= 9) clase = 'alta'
        else if (promedio < 6) clase = 'baja'

        let html = `
        <div id="hijo-${hijo._id}" class="hijo-tab" style="display:${index === 0 ? 'block' : 'none'}">
            <div class="card p-3 mb-3 shadow">
                <h5>👦 ${hijo.nombre}</h5>
                <p>Grupo: ${hijo.grupo || 'N/A'}</p>
                <h6 class="${clase}">Promedio: ${promedio.toFixed(1)}</h6>
                <hr>
        `

        if (califsHijo.length === 0) {
            html += `<p class="text-muted">Sin calificaciones</p>`
        } else {
            califsHijo.forEach(c => {
                let color = 'media'
                if (c.calificacion >= 9) color = 'alta'
                else if (c.calificacion < 6) color = 'baja'

                html += `
                    <div class="d-flex justify-content-between mb-2">
                        <span>${c.materia}</span>
                        <strong class="${color}">${c.calificacion}</strong>
                    </div>
                `
            })
        }

        html += `</div></div>`

        cont.innerHTML += html
    })
}

function mostrarHijo(id) {
    document.querySelectorAll('.hijo-tab').forEach(div => {
        div.style.display = 'none'
    })

    document.getElementById('hijo-' + id).style.display = 'block'

    document.querySelectorAll('.nav-link').forEach(btn => {
        btn.classList.remove('active')
    })

    event.target.classList.add('active')
}

cargar()
</script>

</body>
</html>
