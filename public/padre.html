<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Padre Premium</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    transition: 0.3s;
}

/* 🌙 DARK */
body.dark {
    background: #0f172a;
    color: #e2e8f0;
}
body.dark .sidebar { background: #1e293b; }
body.dark .card { background: #1e293b; color: #e2e8f0; }

/* 🌞 LIGHT */
body.light {
    background: #f1f5f9;
    color: #1e293b;
}
body.light .sidebar {
    background: white;
    border-right: 1px solid #ddd;
}
body.light .card {
    background: white;
    color: #1e293b;
}

/* SIDEBAR */
.sidebar {
    width: 220px;
    height: 100vh;
    position: fixed;
    padding: 20px;
    backdrop-filter: blur(10px);
}

.sidebar button {
    width: 100%;
    border: none;
    background: none;
    padding: 12px;
    text-align: left;
    border-radius: 10px;
    transition: 0.3s;
}

.sidebar button:hover {
    transform: translateX(5px);
}

/* MAIN */
.main {
    margin-left: 220px;
    padding: 20px;
}

/* BOTONES TOP */
.top-buttons {
    position: fixed;
    top: 10px;
    right: 10px;
    display: flex;
    gap: 10px;
    z-index: 1000;
}

/* COLORES */
.alta { color: #22c55e; }
.media { color: #facc15; }
.baja { color: #ef4444; }

/* MOBILE */
.menu-toggle {
    position: fixed;
    top: 10px;
    left: 10px;
    display: none;
}

@media (max-width: 768px) {
    .menu-toggle { display: block; }

    .sidebar {
        transform: translateX(-100%);
        z-index: 1000;
    }

    .sidebar.active {
        transform: translateX(0);
    }

    .main {
        margin-left: 0;
        padding-top: 60px;
    }
}
</style>
</head>

<body>

<!-- ☰ -->
<button class="menu-toggle btn btn-primary" onclick="toggleMenu()">☰</button>

<!-- SIDEBAR -->
<div class="sidebar">
    <h5>👨‍👦 Menú</h5>

    <button onclick="cargar()">🏠 Inicio</button>
    <button onclick="cargarAlertas()">🚨 Alertas</button>
</div>

<!-- BOTONES -->
<div class="top-buttons">
    <button onclick="toggleTheme()" class="btn btn-sm btn-outline-primary">🌙 / ☀️</button>
    <button onclick="logout()" class="btn btn-sm btn-danger">Cerrar Sesión</button>
</div>

<div class="top-buttons">
    <button onclick="toggleTheme()" class="btn btn-sm btn-outline-primary">🌙</button>

    <button onclick="verAlertas()" class="btn btn-sm btn-warning position-relative">
        🔔
        <span id="badge" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">
            0
        </span>
    </button>

    <button onclick="logout()" class="btn btn-sm btn-danger">Salir</button>
</div>

<!-- MAIN -->
<div class="main">
    <h3 class="mb-4">👨‍👦 Panel del Papá</h3>

    <ul class="nav nav-tabs mb-3" id="tabs"></ul>
    <div id="contenido"></div>
</div>

<div id="toast" style="
position: fixed;
bottom: 20px;
right: 20px;
background: #0d6efd;
color: white;
padding: 15px;
border-radius: 10px;
display: none;
z-index: 9999;
">
    🔔 Nueva alerta
</div>

<script>
const token = localStorage.getItem('token')

let alertasGlobal = []

async function actualizarAlertas() {

    const res = await fetch('/alertas', {
        headers: { Authorization: token }
    })

    const data = await res.json()

    alertasGlobal = data

    // 🔴 ACTUALIZAR BADGE
    document.getElementById('badge').innerText = data.length

    // 🔔 MOSTRAR POPUP SI HAY NUEVAS
    if (data.length > 0) {
        mostrarToast(`Tienes ${data.length} alertas`)
    }
}

function mostrarToast(msg) {
    const toast = document.getElementById('toast')
    toast.innerText = msg
    toast.style.display = 'block'

    setTimeout(() => {
        toast.style.display = 'none'
    }, 3000)
}

function verAlertas() {

    let html = '<h3>🚨 Alertas</h3>'

    if (alertasGlobal.length === 0) {
        html += '<p class="text-success">Todo bien 👍</p>'
    } else {

        alertasGlobal.forEach(a => {

            let color = 'warning'
            if (a.tipo === 'pendiente') color = 'secondary'
            if (a.tipo === 'baja') color = 'danger'

            html += `
            <div class="alert alert-${color}">
                ${a.mensaje}
            </div>
            `
        })
    }

    document.getElementById('contenido').innerHTML = html

    // 👀 MARCAR COMO VISTO
    document.getElementById('badge').innerText = 0
}

if (!token) {
    window.location.href = '/index.html'
}

history.pushState(null, null, location.href)
window.onpopstate = () => history.go(1)

window.onload = () => {
    const theme = localStorage.getItem('theme') || 'dark'
    document.body.classList.add(theme)
}

// 🌗 TEMA
function toggleTheme() {
    const body = document.body

    if (body.classList.contains('dark')) {
        body.classList.replace('dark', 'light')
        localStorage.setItem('theme', 'light')
    } else {
        body.classList.replace('light', 'dark')
        localStorage.setItem('theme', 'dark')
    }
}

// ☰ MENU
function toggleMenu() {
    document.querySelector('.sidebar').classList.toggle('active')
}

// 🔐 LOGOUT
function logout() {
    localStorage.removeItem('token')
    window.location.href = '/index.html'
}

const payload = JSON.parse(atob(token.split('.')[1]))

// 🔥 DASHBOARD
async function cargar() {

    const resAlumnos = await fetch('/alumnos', {
        headers: { Authorization: token }
    })
    const alumnos = await resAlumnos.json()

    const resCalif = await fetch('/mis-calificaciones', {
        headers: { Authorization: token }
    })
    const calificaciones = await resCalif.json()

    const hijos = alumnos.filter(a => payload.alumnos?.includes(a._id))

    const tabs = document.getElementById('tabs')
    const cont = document.getElementById('contenido')

    tabs.innerHTML = ''
    cont.innerHTML = ''

    if (hijos.length === 0) {
        cont.innerHTML = '<p>No hay hijos asignados 😢</p>'
        return
    }

    hijos.forEach((hijo, index) => {

        tabs.innerHTML += `
            <li class="nav-item">
                <button class="nav-link ${index === 0 ? 'active' : ''}"
                    onclick="mostrarHijo('${hijo._id}')">
                    👦 ${hijo.nombre}
                </button>
            </li>
        `

        const califsHijo = calificaciones.filter(c => c.alumnoId === hijo._id)

        let promedio = 0
        if (califsHijo.length > 0) {
            promedio = califsHijo.reduce((acc, c) => acc + c.calificacion, 0) / califsHijo.length
        }

        let clase = 'media'
        if (promedio >= 9) clase = 'alta'
        else if (promedio < 6) clase = 'baja'

        let html = `
        <div id="hijo-${hijo._id}" class="hijo-tab" style="display:${index === 0 ? 'block' : 'none'}">
            <div class="card p-3 mb-3 shadow">
                <h5>👦 ${hijo.nombre}</h5>
                <p>Grupo: ${hijo.grupo || 'N/A'}</p>
                <h6 class="${clase}">Promedio: ${promedio.toFixed(1)}</h6>
                <hr>
        `

        if (califsHijo.length === 0) {
            html += `<p class="text-muted">Sin calificaciones</p>`
        } else {
            califsHijo.forEach(c => {
                let color = 'media'
                if (c.calificacion >= 9) color = 'alta'
                else if (c.calificacion < 6) color = 'baja'

                html += `
                    <div class="d-flex justify-content-between mb-2">
                        <span>${c.materia}</span>
                        <strong class="${color}">${c.calificacion}</strong>
                    </div>
                `
            })
        }

        html += `</div></div>`
        cont.innerHTML += html
    })
}

// 🚨 ALERTAS
async function cargarAlertas() {

    const res = await fetch('/alertas', {
        headers: { Authorization: token }
    })

    const data = await res.json()

    let html = '<h3>🚨 Alertas</h3>'

    if (data.length === 0) {
        html += '<p class="text-success">Todo bien 👍</p>'
    } else {
        data.forEach(a => {
            let color = 'warning'
            if (a.tipo === 'pendiente') color = 'secondary'
            if (a.tipo === 'baja') color = 'danger'

            html += `<div class="alert alert-${color}">${a.mensaje}</div>`
        })
    }

    document.getElementById('contenido').innerHTML = html
}

// 🔄 CAMBIAR HIJO
function mostrarHijo(id) {
    document.querySelectorAll('.hijo-tab').forEach(div => div.style.display = 'none')
    document.getElementById('hijo-' + id).style.display = 'block'

    document.querySelectorAll('.nav-link').forEach(btn => btn.classList.remove('active'))
    event.target.classList.add('active')
}



// 🚀 INICIO
cargar()
actualizarAlertas()
setInterval(actualizarAlertas, 5000)
</script>


</body>
</html>
