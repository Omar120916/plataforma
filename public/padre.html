<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Padre</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: #0f172a;
    color: white;
}

.card {
    border-radius: 15px;
}

.hijo {
    border-left: 5px solid #0d6efd;
}
</style>
</head>

<body class="container mt-4">

<h3 class="mb-4">👨‍👦 Panel del Papá</h3>

<div id="contenido" class="row"></div>

<script>
const token = localStorage.getItem('token')

if (!token) {
    window.location.href = '/index.html'
}

// 🔐 bloquear atrás
history.pushState(null, null, location.href)
window.onpopstate = function () {
    history.go(1)
}

// 🔍 decodificar token
const payload = JSON.parse(atob(token.split('.')[1]))

async function cargar() {

    // 🔥 traer TODOS los alumnos
    const resAlumnos = await fetch('/alumnos', {
        headers: { Authorization: token }
    })

    const alumnos = await resAlumnos.json()

    // 🔥 traer calificaciones
    const resCalif = await fetch('/mis-calificaciones', {
        headers: { Authorization: token }
    })

    const calificaciones = await resCalif.json()

    const cont = document.getElementById('contenido')
    cont.innerHTML = ''

    // 🔥 FILTRAR HIJOS
    const hijos = alumnos.filter(a => 
        payload.alumnos?.includes(a._id)
    )

    if (hijos.length === 0) {
        cont.innerHTML = '<p>No hay hijos asignados 😢</p>'
        return
    }

    hijos.forEach(hijo => {

        let html = `
        <div class="col-md-4">
            <div class="card p-3 mb-3 hijo bg-dark">
                <h5>👦 ${hijo.nombre}</h5>
                <hr>
        `

        const califsHijo = calificaciones.filter(c => 
            c.alumnoId === hijo._id
        )

        if (califsHijo.length === 0) {
            html += `<p class="text-muted">Sin calificaciones</p>`
        } else {
            califsHijo.forEach(c => {
                html += `
                    <div class="d-flex justify-content-between">
                        <span>${c.materia}</span>
                        <strong>${c.calificacion}</strong>
                    </div>
                `
            })
        }

        html += `</div></div>`

        cont.innerHTML += html
    })
}

cargar()
</script>

</body>
</html>
