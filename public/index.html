<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport"
    content="width=device-width, initial-scale=1.0">

<title>Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet">

<style>

body{
    margin:0;
    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    background:
        linear-gradient(
            135deg,
            #0f172a,
            #1e3a8a
        );

    font-family:'Segoe UI',sans-serif;
}

.card-login{

    width:100%;
    max-width:400px;

    padding:30px;

    border-radius:20px;

    background:rgba(255,255,255,0.1);

    backdrop-filter:blur(10px);

    box-shadow:
        0 10px 25px rgba(0,0,0,0.3);

    color:white;
}

.card-login h2{
    text-align:center;
    margin-bottom:20px;
}

.form-control{
    margin-bottom:15px;
}

.btn-login{
    width:100%;
}

.logo{
    text-align:center;
    font-size:50px;
    margin-bottom:10px;
}

</style>
</head>

<body>

<div class="card-login">

    <div class="logo">
        🎓
    </div>

    <h2>Iniciar Sesión</h2>

    <input id="usuario"
        class="form-control"
        placeholder="Usuario">

    <input id="password"
        type="password"
        class="form-control"
        placeholder="Contraseña">

    <button class="btn btn-primary btn-login"
        onclick="login()">

        Entrar
    </button>

    <!-- 🔥 RECUPERAR -->
    <div class="text-center mt-3">

        <button class="btn btn-link text-light"
            onclick="mostrarRecuperar()">

            ¿Olvidaste tu contraseña?
        </button>

    </div>

</div>

<!-- 🔐 MODAL -->
<div class="modal fade"
    id="modalRecuperar"
    tabindex="-1">

    <div class="modal-dialog">

        <div class="modal-content">

            <div class="modal-header">

                <h5 class="modal-title">
                    Recuperar contraseña
                </h5>

                <button type="button"
                    class="btn-close"
                    data-bs-dismiss="modal">
                </button>

            </div>

            <div class="modal-body">

                <!-- EMAIL -->
                <input id="resetEmail"
                    class="form-control mb-2"
                    placeholder="Correo electrónico">

                <!-- CÓDIGO -->
                <input id="resetCodigo"
                    class="form-control mb-2"
                    placeholder="Código">

                <!-- PASSWORD -->
                <input id="resetPassword"
                    type="password"
                    class="form-control mb-2"
                    placeholder="Nueva contraseña">

            </div>

            <div class="modal-footer">

                <button class="btn btn-warning"
                    onclick="enviarCodigo()">

                    Enviar código
                </button>

                <button class="btn btn-success"
                    onclick="cambiarPassword()">

                    Cambiar contraseña
                </button>

            </div>

        </div>

    </div>

</div>

<!-- 🔥 BOOTSTRAP -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- 🔥 EMAILJS -->
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<script>

emailjs.init("EBrm5VKBzmbwjmzBq")

// 🔐 LOGIN
async function login() {

    const usuario =
        document.getElementById(
            'usuario'
        ).value

    const password =
        document.getElementById(
            'password'
        ).value

    const res = await fetch('/login', {

        method:'POST',

        headers:{
            'Content-Type':
                'application/json'
        },

        body:JSON.stringify({

            usuario,

            password
        })
    })

    const data = await res.json()

    if(data.token){

        localStorage.setItem(
            'token',
            data.token
        )

        const payload = JSON.parse(
            atob(
                data.token.split('.')[1]
            )
        )

        // 🔥 REDIRECCIONES
        if(payload.rol === 'admin'){
            window.location.href =
                '/dashboard.html'
        }

        if(payload.rol === 'maestro'){
            window.location.href =
                '/maestro.html'
        }

        if(payload.rol === 'alumno'){
            window.location.href =
                '/alumno.html'
        }

        if(payload.rol === 'padre'){
            window.location.href =
                '/padre.html'
        }

    } else {

        alert(
            data.mensaje ||
            'Error'
        )
    }
}

// 🔐 MODAL
function mostrarRecuperar() {

    const modal =
        new bootstrap.Modal(
            document.getElementById(
                'modalRecuperar'
            )
        )

    modal.show()
}

// 📩 ENVIAR CÓDIGO
async function enviarCodigo() {

    const email =
        document.getElementById(
            'resetEmail'
        ).value

    if(!email){

        alert('Pon un correo 😭')
        return
    }

    const codigo =
        Math.floor(
            100000 + Math.random() * 900000
        ).toString()

    localStorage.setItem(
        'codigoReset',
        codigo
    )

    localStorage.setItem(
        'emailReset',
        email
    )

    try {

        await emailjs.send(

            'service_l015cui',

            'template_fg6jryr',

            {
                to_email: email,
                codigo: codigo
            }
        )

        alert('Código enviado 🔥')

    } catch(err) {

        console.log(err)

        alert('Error enviando correo 😭')
    }
}

// 🔑 CAMBIAR PASSWORD
async function cambiarPassword() {

    const email =
        document.getElementById(
            'resetEmail'
        ).value

    const codigo =
        document.getElementById(
            'resetCodigo'
        ).value

    const nuevaPassword =
        document.getElementById(
            'resetPassword'
        ).value

    const codigoGuardado =
        localStorage.getItem(
            'codigoReset'
        )

    const emailGuardado =
        localStorage.getItem(
            'emailReset'
        )

    if(
        codigo !== codigoGuardado ||
        email !== emailGuardado
    ){

        alert('Código incorrecto 😭')
        return
    }

    const res = await fetch(
        '/reset-password',
        {

            method:'POST',

            headers:{
                'Content-Type':
                    'application/json'
            },

            body:JSON.stringify({

                email,

                codigo,

                nuevaPassword
            })
        }
    )

    const data = await res.json()

    alert(data.mensaje)

    localStorage.removeItem(
        'codigoReset'
    )

    localStorage.removeItem(
        'emailReset'
    )
}

</script>

</body>
</html>
