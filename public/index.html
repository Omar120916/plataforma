<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card p-4 shadow" style="width: 350px;">
        <h3 class="text-center mb-3">Iniciar sesión</h3>

        <input class="form-control mb-2" id="usuario" placeholder="Usuario">
        <input class="form-control mb-3" type="password" id="password" placeholder="Contraseña">

        <button class="btn btn-primary w-100" onclick="login()">Entrar</button>

        <hr>

        <button class="btn btn-outline-secondary w-100" onclick="registro()">Crear cuenta</button>
    </div>
</div>

<script>
async function login() {
    const res = await fetch('/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            usuario: document.getElementById('usuario').value,
            password: document.getElementById('password').value
        })
    })

    const data = await res.json()

    if (res.ok) {
        localStorage.setItem('token', data.token)
        window.location.href = 'alumnos.html'
    } else {
        alert(data.mensaje)
    }
}

async function registro() {
    const res = await fetch('/registro', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            usuario: document.getElementById('usuario').value,
            password: document.getElementById('password').value
        })
    })

    const data = await res.json()
    alert(data.mensaje)
}
</script>

</body>
</html>
