<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container">
    <div class="row justify-content-center align-items-center vh-100">
        <div class="col-12 col-sm-8 col-md-5 col-lg-4">
            
            <div class="card p-4 shadow">
                <h3 class="text-center mb-3">Iniciar sesión</h3>

                <input class="form-control mb-2" id="usuario" placeholder="Usuario">
                <input class="form-control mb-3" type="password" id="password" placeholder="Contraseña">

                <button class="btn btn-primary w-100 mb-2" onclick="login()">Entrar</button>

                <button class="btn btn-outline-secondary w-100" onclick="registro()">Crear cuenta</button>
            </div>

        </div>
    </div>
</div>

<script>
async function login() {
    const res = await fetch('/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            usuario: document.getElementById('usuario').value,
            password: document.getElementById('password').value
        })
    })

    const data = await res.json()

    if (res.ok) {
        localStorage.setItem('token', data.token)
        window.location.href = 'dashboard.html'
    } else {
        alert(data.mensaje)
    }
}

async function registro() {
    const res = await fetch('/registro', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            usuario: document.getElementById('usuario').value,
            password: document.getElementById('password').value
        })
    })

    const data = await res.json()
    alert(data.mensaje)
}
</script>

</body>
</html>
