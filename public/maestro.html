<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maestro</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    transition: 0.3s;
}

/* 🌙 DARK */
body.dark {
    background: #0f172a;
    color: #e2e8f0;
}

body.dark .sidebar {
    background: #1e293b;
}

body.dark .sidebar button {
    color: #e2e8f0;
}

body.dark .sidebar button:hover {
    background: #334155;
}

body.dark .card {
    background: #1e293b;
    color: #e2e8f0;
}

/* 🌞 LIGHT */
body.light {
    background: #f1f5f9;
    color: #1e293b;
}

body.light .sidebar {
    background: white;
    border-right: 1px solid #e5e7eb;
}

body.light .sidebar button {
    color: #1e293b;
}

body.light .sidebar button:hover {
    background: #e2e8f0;
}

body.light .card {
    background: white;
    color: #1e293b;
}

/* SIDEBAR */
.sidebar {
    width: 220px;
    height: 100vh;
    position: fixed;
    padding: 20px;
    backdrop-filter: blur(10px);
    transition: 0.3s;
}

.sidebar button {
    width: 100%;
    border: none;
    background: none;
    padding: 12px;
    text-align: left;
    border-radius: 10px;
    transition: 0.3s;
}

.sidebar button:hover {
    transform: translateX(5px);
}

/* MAIN */
.main {
    margin-left: 220px;
    padding: 20px;
}

/* CARD */
.card {
    border-radius: 15px;
}

/* CHAT */
#chat {
    height: 300px;
    overflow-y: auto;
}

/* RESPONSIVE */
.menu-toggle {
    position: fixed;
    top: 10px;
    left: 10px;
    display: none;
}

@media (max-width: 768px) {

    .menu-toggle {
        display: block;
    }

    .sidebar {
        transform: translateX(-100%);
        z-index: 1000;
    }

    .sidebar.active {
        transform: translateX(0);
    }

    .main {
        margin-left: 0;
        padding-top: 60px;
    }

    .card h5 {
        font-weight: bold;
        border-bottom: 1px solid #ccc;
        padding-bottom: 5px;
    }

    input.form-control-sm {
        font-size: 0.85rem;
    }
}
</style>
</head>

<body>

<nav class="p-3">
    <h5>👨‍🏫 Maestro Dashboard</h5>
</nav>

<button onclick="logout()" class="btn btn-sm btn-danger"
    style="position:fixed; top:50px; right:10px;">
    Cerrar Sesión
</button>

<button class="menu-toggle btn btn-primary"
    onclick="toggleMenu()">
    ☰
</button>

<button onclick="toggleTheme()"
    class="btn btn-sm btn-outline-light"
    style="position:fixed; top:10px; right:10px;">
    🌙 / ☀️
</button>

<!-- SIDEBAR -->
<div class="sidebar">

    <button onclick="mostrar('materias')">
        📚 Mis materias
    </button>

    <button onclick="mostrar('alumnos')">
        👨‍🎓 Alumnos
    </button>

    <button onclick="mostrar('tareas')">
        📝 Tareas
    </button>

</div>

<!-- MAIN -->
<div class="main">

    <div id="contenido"></div>

    <!-- CHAT -->
    <div class="card p-3 mt-4">

    <h5>💬 Chat</h5>

    <select id="usuariosChat"
        class="form-select mb-2"
        onchange="seleccionarUsuario()">

    </select>

    <div id="chat" style="
        height:300px;
        overflow:auto;
        border:1px solid #ccc;
        border-radius:10px;
        padding:10px;
    "></div>

    <input id="mensaje"
        class="form-control mt-2"
        placeholder="Mensaje">

    <button class="btn btn-primary mt-2"
        onclick="enviarMensaje()">

        Enviar
    </button>

</div>

</div>

<!-- SOCKET -->
<script src="/socket.io/socket.io.js"></script>

<script>

const token = localStorage.getItem('token')

if (!token) {
    window.location.href = '/index.html'
}

const socket = io()

const payload = JSON.parse(
    atob(token.split('.')[1])
)

socket.emit('entrar', payload.id)

let receptorActual = ''

history.pushState(null, null, location.href)

window.onpopstate = function () {
    history.go(1)
}

// 🔥 TEMA
window.onload = () => {
    const theme = localStorage.getItem('theme') || 'dark'
    document.body.classList.add(theme)
}

// 🌗 CAMBIAR TEMA
function toggleTheme() {

    const body = document.body

    if (body.classList.contains('dark')) {

        body.classList.replace('dark', 'light')
        localStorage.setItem('theme', 'light')

    } else {

        body.classList.replace('light', 'dark')
        localStorage.setItem('theme', 'dark')
    }
}

// ☰ MENÚ
function toggleMenu() {
    document.querySelector('.sidebar')
        .classList.toggle('active')
}

// 🔄 CAMBIAR VISTA
function mostrar(tipo) {

    if (tipo === 'materias') cargarMaterias()

    if (tipo === 'alumnos') cargarAlumnos()

    if (tipo === 'tareas') cargarTareas()

    const sidebar = document.querySelector('.sidebar')

    if (sidebar) sidebar.classList.remove('active')
}

// 📚 MATERIAS
async function cargarMaterias() {

    const res = await fetch('/mis-materias', {
        headers: {
            Authorization: token
        }
    })

    const data = await res.json()

    let html = '<h3>Mis materias</h3>'

    data.forEach(m => {

        html += `
        <div class="card p-3 mb-2">
            ${m.nombre}
        </div>
        `
    })

    document.getElementById('contenido')
        .innerHTML = html
}

// 👨‍🎓 ALUMNOS
async function cargarAlumnos() {

    const res = await fetch('/mis-alumnos', {
        headers: {
            Authorization: token
        }
    })

    const data = await res.json()

    const resCalifs = await fetch('/mis-calificaciones', {
        headers: {
            Authorization: token
        }
    })

    const calificaciones = await resCalifs.json()

    const mapa = {}

    data.forEach(a => {

        const key = a.materiaNombre + '-' + a.grupo

        if (!mapa[key]) {

            mapa[key] = {
                materia: a.materiaNombre,
                grupo: a.grupo,
                alumnos: []
            }
        }

        mapa[key].alumnos.push(a)
    })

    let html = '<h3>Mis alumnos</h3><div class="row">'

    for (let key in mapa) {

        const bloque = mapa[key]

        html += `
        <div class="col-12">

            <div class="card p-3 mb-4 shadow">

                <h5>
                    📚 ${bloque.materia}
                </h5>

                <small class="text-muted mb-2 d-block">
                    Grupo ${bloque.grupo}
                </small>

                <table class="table table-sm">

                    <thead>
                        <tr>
                            <th>Alumno</th>
                            <th>Calificación</th>
                        </tr>
                    </thead>

                    <tbody>
        `

        bloque.alumnos.forEach(a => {

            const yaCalificado = calificaciones.find(c =>
                c.alumnoId === a._id &&
                c.materia === a.materiaNombre
            )

            if (yaCalificado) {

                html += `
                <tr>

                    <td>${a.nombre}</td>

                    <td class="text-success">
                        ✅ ${yaCalificado.calificacion}
                    </td>

                </tr>
                `

            } else {

                html += `
                <tr>

                    <td>${a.nombre}</td>

                    <td>

                        <input type="number"
                            class="form-control form-control-sm mb-1"
                            id="cal-${a._id}-${a.materiaId}">

                        <button class="btn btn-primary btn-sm w-100"
                            onclick="guardarCal('${a._id}','${a.materiaId}')">

                            Guardar
                        </button>

                    </td>

                </tr>
                `
            }
        })

        html += `
                    </tbody>
                </table>

            </div>

        </div>
        `
    }

    html += '</div>'

    document.getElementById('contenido')
        .innerHTML = html
}

// 📝 TAREAS
async function cargarTareas() {

    const [resMaterias, resTareas] = await Promise.all([

        fetch('/mis-materias', {
            headers: {
                Authorization: token
            }
        }),

        fetch('/tareas', {
            headers: {
                Authorization: token
            }
        })

    ])

    const materias = await resMaterias.json()
    const tareas = await resTareas.json()

    let html = `
    <div class="card p-4 mb-4 shadow">

        <h3 class="mb-3">
            📝 Crear tarea
        </h3>

        <input id="titulo"
            class="form-control mb-2"
            placeholder="Título">

        <textarea id="descripcion"
            class="form-control mb-2"
            placeholder="Descripción"></textarea>

        <select id="materia"
            class="form-select mb-2">

            ${materias.map(m => `
                <option value="${m._id}">
                    ${m.nombre}
                </option>
            `).join('')}

        </select>

        <input id="grupo"
            class="form-control mb-2"
            placeholder="Grupo">

        <label>Fecha límite</label>

        <input type="date"
            id="fecha"
            class="form-control mb-2">

        <label>Hora límite</label>

        <input type="time"
            id="hora"
            class="form-control mb-3">

        <button class="btn btn-primary w-100"
            onclick="crearTarea()">

            Crear tarea
        </button>

    </div>

    <h3 class="mb-3">
        📚 Tareas creadas
    </h3>
    `

    tareas.forEach(t => {

        const materia = materias.find(m =>
            m._id === t.materiaId
        )

        html += `
        <div class="card p-3 mb-3 shadow">

            <h5>${t.titulo}</h5>

            <button class="btn btn-success btn-sm mt-2"
                onclick="verEntregas('${t._id}')">

                Ver entregas
            </button>

            <div id="entregas-${t._id}"
                class="mt-2"></div>

            <p>${t.descripcion || ''}</p>

            <small class="d-block">
                📚 Materia:
                ${materia?.nombre || 'Sin materia'}
            </small>

            <small class="d-block">
                👥 Grupo:
                ${t.grupo}
            </small>

            <small class="d-block text-danger">
                ⏰ Límite:
                ${t.fechaLimite} ${t.horaLimite}
            </small>

        </div>
        `
    })

    document.getElementById('contenido')
        .innerHTML = html
}

// ➕ CREAR TAREA
async function crearTarea() {

    const titulo =
        document.getElementById('titulo').value

    const descripcion =
        document.getElementById('descripcion').value

    const materiaId =
        document.getElementById('materia').value

    const grupo =
        document.getElementById('grupo').value

    const fechaLimite =
        document.getElementById('fecha').value

    const horaLimite =
        document.getElementById('hora').value

    const res = await fetch('/tareas', {

        method: 'POST',

        headers: {
            'Content-Type': 'application/json',
            Authorization: token
        },

        body: JSON.stringify({
            titulo,
            descripcion,
            materiaId,
            grupo,
            fechaLimite,
            horaLimite
        })
    })

    const data = await res.json()

    alert(data.mensaje || 'Tarea creada 🔥')

    cargarTareas()
}

// 👀 VER ENTREGAS
async function verEntregas(tareaId) {

    const res = await fetch(`/entregas/${tareaId}`, {
        headers: {
            Authorization: token
        }
    })

    const data = await res.json()

    let html = ''

    if (data.length === 0) {

        html = `
        <div class="alert alert-warning mt-2">
            Nadie ha entregado 😢
        </div>
        `

    } else {

        data.forEach(e => {

            if (e.calificacion) {

                html += `
                <div class="card p-2 mb-2">

                    <b>👨‍🎓 ${e.alumno}</b>

                    <small class="d-block">
                        ✅ Ya calificado:
                        ${e.calificacion}
                    </small>

                    <small class="d-block">
                        💬 ${e.comentario || 'Sin comentario'}
                    </small>

                    <a href="/uploads/${e.archivo}"
                        target="_blank"
                        class="btn btn-primary btn-sm mt-2">

                        Ver archivo
                    </a>

                </div>
                `

            } else {

                html += `
                <div class="card p-2 mb-2">

                    <b>👨‍🎓 ${e.alumno}</b>

                    <small class="d-block">
                        📅 ${new Date(e.fechaEntrega)
                            .toLocaleString()}
                    </small>

                    <a href="/uploads/${e.archivo}"
                        target="_blank"
                        class="btn btn-primary btn-sm mt-2">

                        Ver archivo
                    </a>

                    <div class="mt-2">

                        <input type="number"
                            id="cal-${e._id}"
                            class="form-control mb-2"
                            placeholder="Calificación">

                        <textarea
                            id="com-${e._id}"
                            class="form-control mb-2"
                            placeholder="Comentario"></textarea>

                        <button class="btn btn-success btn-sm"
                            onclick="calificarEntrega('${e._id}')">

                            Calificar
                        </button>

                    </div>

                </div>
                `
            }
        })
    }

    document.getElementById(`entregas-${tareaId}`)
        .innerHTML = html
}

// ⭐ CALIFICAR ENTREGA
async function calificarEntrega(id) {

    const calificacion =
        document.getElementById(`cal-${id}`).value

    const comentario =
        document.getElementById(`com-${id}`).value

    const res = await fetch(`/calificar-tarea/${id}`, {

        method: 'PUT',

        headers: {
            'Content-Type': 'application/json',
            Authorization: token
        },

        body: JSON.stringify({
            calificacion,
            comentario
        })
    })

    const data = await res.json()

    alert(data.mensaje)
}

// 💾 GUARDAR CALIFICACIÓN
async function guardarCal(alumnoId, materiaId) {

    const cal =
        document.getElementById(
            `cal-${alumnoId}-${materiaId}`
        ).value

    await fetch('/calificaciones', {

        method: 'POST',

        headers: {
            'Content-Type': 'application/json',
            Authorization: token
        },

        body: JSON.stringify({
            alumnoId,
            materiaId,
            calificacion: cal
        })
    })

    alert('Guardado 🔥')

    cargarAlumnos()
}

// 💬 CHAT
function seleccionarChat(idUsuario) {
    receptorActual = idUsuario
}

function enviarMensaje() {

    const mensaje =
        document.getElementById('mensaje').value

    if (!receptorActual) {
        alert('Selecciona un usuario')
        return
    }

    socket.emit('mensaje', {
        de: payload.id,
        para: receptorActual,
        mensaje
    })

    document.getElementById('mensaje').value = ''
}

socket.on('mensaje', (data) => {

    document.getElementById('chat').innerHTML += `
        <div class="mb-2">

            <strong>${data.de}</strong>:
            ${data.mensaje}

        </div>
    `

    const chat =
        document.getElementById('chat')

    chat.scrollTop = chat.scrollHeight
})

// 🔐 LOGOUT
function logout() {

    if (confirm('¿Seguro que quieres cerrar sesión?')) {

        localStorage.removeItem('token')

        window.location.href = '/index.html'
    }
}

// =====================
// 💬 CHAT
// =====================

let receptorId = ''

// 🔥 CARGAR USUARIOS
async function cargarUsuariosChat() {

    const res = await fetch('/usuarios', {
        headers: {
            Authorization: token
        }
    })

    const usuarios = await res.json()

    let html = `
        <option value="">
            Selecciona usuario
        </option>
    `

    usuarios.forEach(u => {

        if (u._id !== payload.id) {

            html += `
                <option value="${u._id}">
                    ${u.nombre} (${u.rol})
                </option>
            `
        }
    })

    document.getElementById('usuariosChat')
        .innerHTML = html
}

// 👤 SELECCIONAR
function seleccionarUsuario() {

    receptorId =
        document.getElementById('usuariosChat').value

    cargarMensajes(receptorId)
}

// 📥 HISTORIAL
async function cargarMensajes(usuarioId) {

    const res = await fetch(`/mensajes/${usuarioId}`, {
        headers: {
            Authorization: token
        }
    })

    const mensajes = await res.json()

    let html = ''

    mensajes.forEach(msg => {

        html += `
            <div class="mb-2">

                <b>
                    ${msg.de === payload.id
                        ? 'Tú'
                        : 'Ellos'}
                    :
                </b>

                ${msg.mensaje}

            </div>
        `
    })

    document.getElementById('chat').innerHTML = html
}

// 📤 ENVIAR
function enviarMensaje() {

    const mensaje =
        document.getElementById('mensaje').value

    if (!receptorId) {
        alert('Selecciona usuario')
        return
    }

    if (!mensaje) return

    socket.emit('mensaje', {
        de: payload.id,
        para: receptorId,
        mensaje
    })

    document.getElementById('mensaje').value = ''
}

// 📥 RECIBIR
socket.on('mensaje', (msg) => {

    document.getElementById('chat').innerHTML += `

        <div class="mb-2">

            <b>
                ${msg.de === payload.id
                    ? 'Tú'
                    : 'Ellos'}
                :
            </b>

            ${msg.mensaje}

        </div>
    `

    const chat =
        document.getElementById('chat')

    chat.scrollTop =
        chat.scrollHeight
})

// 🚀 INICIO
mostrar('materias')

cargarUsuariosChat()

</script>

</body>
</html>
