<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maestro</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    transition: 0.3s;
}

/* 🌙 DARK */
body.dark {
    background: #0f172a;
    color: #e2e8f0;
}

body.dark .sidebar {
    background: #1e293b;
}

body.dark .sidebar button {
    color: #e2e8f0;
}

body.dark .sidebar button:hover {
    background: #334155;
}

body.dark .card {
    background: #1e293b;
    color: #e2e8f0;
}

/* 🌞 LIGHT */
body.light {
    background: #f1f5f9;
    color: #1e293b;
}

body.light .sidebar {
    background: white;
    border-right: 1px solid #e5e7eb;
}

body.light .sidebar button {
    color: #1e293b;
}

body.light .sidebar button:hover {
    background: #e2e8f0;
}

body.light .card {
    background: white;
    color: #1e293b;
}

/* SIDEBAR */
.sidebar {
    width: 220px;
    height: 100vh;
    position: fixed;
    padding: 20px;
    backdrop-filter: blur(10px);
    transition: 0.3s;
}

.sidebar button {
    width: 100%;
    border: none;
    background: none;
    padding: 12px;
    text-align: left;
    border-radius: 10px;
    transition: 0.3s;
}

.sidebar button:hover {
    transform: translateX(5px);
}

/* MAIN */
.main {
    margin-left: 220px;
    padding: 20px;
}

/* CARD */
.card {
    border-radius: 15px;
}

/* RESPONSIVE */
.menu-toggle {
    position: fixed;
    top: 10px;
    left: 10px;
    display: none;
}

@media (max-width: 768px) {
    .menu-toggle { display: block; }

    .sidebar {
        transform: translateX(-100%);
        z-index: 1000;
    }

    .sidebar.active {
        transform: translateX(0);
    }

    .main {
        margin-left: 0;
        padding-top: 60px;
    }
}
</style>
</head>

<body>

<nav class="p-3">
    <h5>👨‍🏫 Maestro Dashboard</h5>
</nav>

<button onclick="logout()" class="btn btn-sm btn-danger" style="position:fixed; top: 50px; right: 10px;">
        Cerrar Sesion
    </button>
<!-- BOTÓN TEMA -->
<button onclick="toggleTheme()" class="btn btn-sm btn-outline-light" style="position: fixed; top: 10px; right: 10px;">
🌙 / ☀️
</button>

<!-- MENÚ ☰ -->
<button class="menu-toggle" onclick="toggleMenu()">☰</button>

<!-- SIDEBAR -->
<div class="sidebar">
    <button onclick="mostrar('materias')">📚 Mis materias</button>
    <button onclick="mostrar('alumnos')">👨‍🎓 Alumnos</button>
    
</div>

<!-- MAIN -->
<div class="main" id="contenido"></div>

<script>
const token = localStorage.getItem('token')

// 🔥 CARGAR TEMA BIEN
window.onload = () => {
    const theme = localStorage.getItem('theme') || 'dark'
    document.body.classList.add(theme)
}

// 🌗 CAMBIAR TEMA (CORREGIDO)
function toggleTheme() {
    const body = document.body

    if (body.classList.contains('dark')) {
        body.classList.replace('dark', 'light')
        localStorage.setItem('theme', 'light')
    } else {
        body.classList.replace('light', 'dark')
        localStorage.setItem('theme', 'dark')
    }
}

// ☰ MENÚ
function toggleMenu() {
    document.querySelector('.sidebar').classList.toggle('active')
}

// 🔄 CAMBIAR VISTA
function mostrar(tipo) {
    if (tipo === 'materias') cargarMaterias()
    if (tipo === 'alumnos') cargarAlumnos()

    const sidebar = document.querySelector('.sidebar')
    if (sidebar) sidebar.classList.remove('active')
}

// 📚 MATERIAS
async function cargarMaterias() {
    const res = await fetch('/mis-materias', {
        headers: { Authorization: token }
    })

    const data = await res.json()

    let html = '<h3>Mis materias</h3>'

    data.forEach(m => {
        html += `<div class="card p-3 mb-2">${m.nombre}</div>`
    })

    document.getElementById('contenido').innerHTML = html
}

// 👨‍🎓 ALUMNOS
async function cargarAlumnos() {
    const res = await fetch('/mis-alumnos', {
        headers: { Authorization: token }
    })

    const data = await res.json()

    let html = '<h3>Mis alumnos</h3>'

    data.forEach(a => {
        html += `
        <div class="card p-3 mb-2">
            ${a.nombre}
            <input type="number" placeholder="Calificación" id="cal-${a._id}" class="form-control my-2">
            <button class="btn btn-primary btn-sm" onclick="guardarCal('${a._id}', '${a.materiaId}')">
                Guardar
            </button>
        </div>`
    })

    document.getElementById('contenido').innerHTML = html
}

// 💾 GUARDAR CALIFICACIÓN
async function guardarCal(alumnoId, materiaId) {
    const cal = document.getElementById(`cal-${alumnoId}`).value

    await fetch('/calificaciones', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            Authorization: token
        },
        body: JSON.stringify({
            alumnoId,
            materiaId,
            calificacion: cal
        })
    })

    alert('Guardado 🔥')
}

function logout() {
    if (confirm('¿Seguro que quieres cerrar sesión?')) {
        localStorage.removeItem('token')
        window.location.href = '/login.html'
    }
}

// 🚀 INICIO
mostrar('materias')
</script>

</body>
</html>
